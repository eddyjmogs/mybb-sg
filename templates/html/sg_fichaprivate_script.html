<script>
var sgFichaTecAprendidas = {$tec_aprendidas};

function sgFichaEscapeHtml(value) {
  if (value === null || value === undefined) {
    return '';
  }

  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function sgFichaNormalizeText(value) {
  if (!value) {
    return '';
  }

  return String(value).toLowerCase().replace(/\s+/g, ' ').replace(/^\s+|\s+$/g, '');
}

function sgFichaSlugify(value) {
  return sgFichaNormalizeText(value).replace(/[^a-z0-9]+/g, '-');
}

function sgFichaCreateTechniqueBadge(icon, text, accent) {
  if (!text) {
    return '';
  }

  return ''
    + '<div class="sg-technique__badge' + (accent ? ' sg-technique__badge--accent' : '') + '">'
    +   text
    + '</div>';
}

function sgFichaCreateTechniqueCard(tecnica) {
  var badges = [];
  var description = tecnica.descripcion ? tecnica.descripcion : 'Sin descripción disponible.';
  var effectText = tecnica.efecto ? tecnica.efecto : 'No tiene efecto adicional especificado.';
  var costText = tecnica.coste ? tecnica.coste : 'Sin coste indicado';

  badges.push(sgFichaCreateTechniqueBadge('', 'Rango ' + tecnica.rango, true));

  if (tecnica.requisito) {
    badges.push(sgFichaCreateTechniqueBadge('', tecnica.requisito, false));
  }
  if (tecnica.tipo) {
    badges.push(sgFichaCreateTechniqueBadge('', tecnica.tipo, false));
  }
  if (tecnica.categoria && tecnica.categoria != tecnica.tipo) {
    badges.push(sgFichaCreateTechniqueBadge('', tecnica.categoria, false));
  }
  if (tecnica.sellos) {
    badges.push(sgFichaCreateTechniqueBadge('', 'Sellos: ' + tecnica.sellos, false));
  }
  if (tecnica.tiempo) {
    badges.push(sgFichaCreateTechniqueBadge('', 'Aprendida en ' + tecnica.tiempo, false));
  }
  badges.push(sgFichaCreateTechniqueBadge('', 'ID: ' + tecnica.tid, false));

  return ''
    + '<div class="sg-technique">'
    +   '<div class="sg-technique__layout">'
    +     '<div class="sg-technique__rail">'
    +       '<div class="sg-technique__badges">' + badges.join('') + '</div>'
    +       '<div class="sg-technique__side-panels">'
    +         '<div class="sg-technique__stat">'
      +         '<div class="sg-technique__stat-label">Coste</div>'
      +         '<div class="sg-technique__stat-value">' + costText + '</div>'
    +         '</div>'
    +       '</div>'
    +     '</div>'
    +     '<div class="sg-technique__main">'
    +       '<div class="sg-technique__section sg-technique__section--reading">'
    +         '<div class="sg-technique__section-label">Descripción</div>'
    +         '<p class="sg-technique__text">' + description + '</p>'
    +       '</div>'
    +       '<div class="sg-technique__section sg-technique__section--effect">'
    +         '<div class="sg-technique__section-label">Efecto</div>'
    +         '<div class="sg-technique__text' + (tecnica.efecto ? '' : ' sg-technique__text--muted') + '">' + effectText + '</div>'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';
}

function sgFichaCreateTechniqueSpoiler(tecnica, familyKey) {
  var searchIndex = sgFichaNormalizeText([
    tecnica.nombre,
    tecnica.tid,
    tecnica.tipo,
    tecnica.categoria,
    tecnica.requisito,
    tecnica.sellos,
    tecnica.descripcion,
    tecnica.efecto,
    familyKey
  ].join(' '));

  return ''
    + '<div class="sg-technique-item" data-family="' + sgFichaEscapeHtml(familyKey) + '" data-rank="' + sgFichaEscapeHtml(String(tecnica.rango || '')) + '" data-search="' + sgFichaEscapeHtml(searchIndex) + '">'
    + sgCreateSpoiler({
    classes: 'sg-spoiler--warm',
    icon: '●',
    eyebrow: 'Rango ' + tecnica.rango,
    title: sgFichaEscapeHtml(tecnica.nombre),
    count: sgFichaEscapeHtml(tecnica.tid),
    open: false,
    content: sgFichaCreateTechniqueCard(tecnica)
    })
    + '</div>';
}

function sgFichaSortTechniquesByTid(a, b) {
  if (a.tid < b.tid) {
    return -1;
  }
  if (a.tid > b.tid) {
    return 1;
  }
  return 0;
}

function sgFichaHumanizeKey(key) {
  return key.replace(/_/g, ' ');
}

function sgFichaCreateTechniqueGroup(key, techniques) {
  var sorted = techniques.slice().sort(sgFichaSortTechniquesByTid);
  var content = '';
  var familyLabel = sgFichaHumanizeKey(key);
  var familySlug = sgFichaSlugify(key);
  var i = 0;

  for (i = 0; i < sorted.length; i++) {
    content += sgFichaCreateTechniqueSpoiler(sorted[i], familySlug);
  }

  return ''
    + '<div class="sg-technique-family" data-family="' + sgFichaEscapeHtml(familySlug) + '" data-family-label="' + sgFichaEscapeHtml(familyLabel) + '">'
    + sgCreateSpoiler({
    classes: '',
    icon: '◈',
    eyebrow: 'Familia',
    title: sgFichaEscapeHtml(familyLabel),
    count: sorted.length + ' tecnicas',
    open: false,
    content: content
    })
    + '</div>';
}

function sgFichaCountAllTechniques(data) {
  var keys = Object.keys(data || {});
  var total = 0;
  var i = 0;

  for (i = 0; i < keys.length; i++) {
    total += (data[keys[i]] || []).length;
  }

  return total;
}

function sgFichaPopulateTechniqueFilters() {
  var familySelect = document.getElementById('sg-profile-technique-family');
  var rankSelect = document.getElementById('sg-profile-technique-rank');
  var families = {};
  var ranks = {};
  var familyNodes;
  var techniqueNodes;
  var i;
  var familyValue;
  var familyLabel;
  var rankValue;
  var familyKeys;
  var rankKeys;

  if (!familySelect || !rankSelect) {
    return;
  }

  familyNodes = document.querySelectorAll('.sg-technique-family');
  techniqueNodes = document.querySelectorAll('.sg-technique-item');

  for (i = 0; i < familyNodes.length; i++) {
    familyValue = familyNodes[i].getAttribute('data-family');
    familyLabel = familyNodes[i].getAttribute('data-family-label');
    if (familyValue && familyLabel) {
      families[familyValue] = familyLabel;
    }
  }

  for (i = 0; i < techniqueNodes.length; i++) {
    rankValue = techniqueNodes[i].getAttribute('data-rank');
    if (rankValue) {
      ranks[rankValue] = true;
    }
  }

  familySelect.innerHTML = '<option value="">Todas las familias</option>';
  familyKeys = Object.keys(families).sort();
  for (i = 0; i < familyKeys.length; i++) {
    familySelect.innerHTML += '<option value="' + sgFichaEscapeHtml(familyKeys[i]) + '">' + sgFichaEscapeHtml(families[familyKeys[i]]) + '</option>';
  }

  rankSelect.innerHTML = '<option value="">Todos los rangos</option>';
  rankKeys = Object.keys(ranks).sort();
  for (i = 0; i < rankKeys.length; i++) {
    rankSelect.innerHTML += '<option value="' + sgFichaEscapeHtml(rankKeys[i]) + '">Rango ' + sgFichaEscapeHtml(rankKeys[i]) + '</option>';
  }
}

function sgFichaUpdateTechniqueCount(visibleCount) {
  var counter = document.getElementById('sg-profile-technique-count');
  if (!counter) {
    return;
  }

  counter.textContent = visibleCount + (visibleCount === 1 ? ' técnica' : ' técnicas');
}

function sgFichaToggleTechniqueFilters(forceOpen) {
  var panel = document.getElementById('sg-profile-technique-filters');
  var button = document.getElementById('sg-profile-filter-toggle');
  var shouldOpen;

  if (!panel || !button) {
    return;
  }

  shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !panel.classList.contains('is-open');
  panel.classList.toggle('is-open', shouldOpen);
  panel.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
  button.classList.toggle('is-active', shouldOpen);
}

function sgFichaApplyTechniqueFilters() {
  var searchInput = document.getElementById('sg-profile-technique-search');
  var familySelect = document.getElementById('sg-profile-technique-family');
  var rankSelect = document.getElementById('sg-profile-technique-rank');
  var familyNodes = document.querySelectorAll('.sg-technique-family');
  var itemNodes = document.querySelectorAll('.sg-technique-item');
  var query = sgFichaNormalizeText(searchInput ? searchInput.value : '');
  var familyValue = familySelect ? familySelect.value : '';
  var rankValue = rankSelect ? rankSelect.value : '';
  var visibleCount = 0;
  var i;
  var item;
  var matches;
  var familyNode;
  var visibleInFamily;

  for (i = 0; i < itemNodes.length; i++) {
    item = itemNodes[i];
    matches = true;

    if (query && item.getAttribute('data-search').indexOf(query) === -1) {
      matches = false;
    }
    if (matches && familyValue && item.getAttribute('data-family') !== familyValue) {
      matches = false;
    }
    if (matches && rankValue && item.getAttribute('data-rank') !== rankValue) {
      matches = false;
    }

    item.classList.toggle('is-hidden', !matches);

    if (matches) {
      visibleCount++;
    }
  }

  for (i = 0; i < familyNodes.length; i++) {
    familyNode = familyNodes[i];
    visibleInFamily = familyNode.querySelector('.sg-technique-item:not(.is-hidden)');
    familyNode.classList.toggle('is-hidden', !visibleInFamily);
  }

  sgFichaUpdateTechniqueCount(visibleCount);
}

function sgFichaRenderPrivateTechniques() {
  var container = document.getElementById('sg-profile-techniques');
  var keys = Object.keys(sgFichaTecAprendidas || {});
  var html = '';
  var i = 0;

  if (!container) {
    return;
  }

  if (!keys.length) {
    container.innerHTML = '<div class="sg-profile-techniques-empty">No hay técnicas aprendidas registradas todavía.</div>';
    sgFichaUpdateTechniqueCount(0);
    return;
  }

  for (i = 0; i < keys.length; i++) {
    html += sgFichaCreateTechniqueGroup(keys[i], sgFichaTecAprendidas[keys[i]]);
  }

  container.innerHTML = html;
  sgFichaPopulateTechniqueFilters();
  sgFichaUpdateTechniqueCount(sgFichaCountAllTechniques(sgFichaTecAprendidas));
  sgFichaApplyTechniqueFilters();
}

window.addEventListener('load', sgFichaRenderPrivateTechniques);
</script>
