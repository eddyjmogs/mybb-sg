<html>

<head>
   <style>
	.statscalculator {
		background-color: #083875;
		width: 400px;
		height: 370px;
		margin-right: 5px;
		margin-top: -10px;
		border-radius: 3px;
		margin-bottom: 20px;
		text-align: center
	}
	   
	.fichastats {
		padding-bottom: 5px;
		margin: 10px auto
	}
	   
    .upperblackbar {
		height: 40px;
		background-color: #0e1a28;
		padding-bottom: 2px;
		border-radius: 3px 3px 0 0
	}
	   
	.upperbartittle {
		padding-top: 5px;
		color: #fff;
		font-size: 24px;
		font-family: Lemon Milk,Impact,Haettenschweiler,"Franklin Gothic Bold",Charcoal,"Helvetica Inserat","Bitstream Vera Sans Bold","Arial Black","sans serif"
	}
	   
	.cstats {
		width: 150px;
		display: inline-block;
		padding: 10px;
		margin-left: 10px
	}

	.cstat {
		height: 19px;
		font-size: 14px;
		font-family: Lemon Milk,Impact,Haettenschweiler,"Franklin Gothic Bold",Charcoal,"Helvetica Inserat","Bitstream Vera Sans Bold","Arial Black","sans serif";
		text-align: right;
		color: white;
	}
	   
	.calcstatsedit {
		width: 200px;
		float: right;
		margin: 10px
	}

	.calcstatsedit input {
		width: 200px;
		height: 16px;
		border: 1px solid #083875;
		background: #245a9e;
		color: #FFF;
		text-align: center;
		font-weight: bold;
	}
	   
	.personaje_stats {
		font-weight: bold;
		color: #ff8700
	}

	.personaje_vida {
		font-weight: bold;
		color: #c80514
	}

	.personaje_chakra {
		font-weight: bold;
		color: #338bce
	}



   </style>
  <title>Shinobi Gaiden</title>
  {$headerinclude}
</head>

<body>
  {$header}
  <div class="fondo-blanco" style="text-align: center;">
  <table class="tripanel" style=" margin: auto; ">
    <tbody>
      <tr>
        <td>
          <div class="statscalculator">
            <div class="fichastats">
              <div class="upperblackbar">
                <div class="upperbartittle">Calculadora de Estadísticas</div>
              </div>
              <div class="cstats">
                <div class="cstat">Fuerza:</div>
                <div class="cstat">Destreza:</div>
                <div class="cstat">Ctrl. de Chakra:</div>
                <div class="cstat">Inteligencia:</div>
                <div class="cstat">Salud:</div>
                <div class="cstat">Velocidad:</div>
                <div class="cstat">Tenketsu:</div>
                <div class="cstat">Sigilo:</div>
              </div>
              <div class="calcstatsedit">
                <input onchange="statsvalue();" type="number" id="fuerza" min="0" value="0">
                <input onchange="statsvalue();" type="number" id="destreza" min="0" value="0">
                <input onchange="statsvalue();" type="number" id="cchakra" min="0" value="0">
                <input onchange="statsvalue();" type="number" id="inteligencia" min="0" value="0">
                <input onchange="statsvalue();" type="number" id="salud" min="9" value="9">
                <input onchange="statsvalue();" type="number" id="velocidad" min="9" value="9">
                <input onchange="statsvalue();" type="number" id="tenketsu" min="9" value="9">
                <input onchange="statsvalue();" type="number" id="sigilo" min="9" value="9">
              </div>
            </div>
			  <br>
			<div style=" color: white; text-align: center; ">
			Vida: <span class="personaje_vida" id="hp">180</span> <img title="Vida" style="width: 9px;top: -1px;position: relative;" src="/images/sg/icons/vida.png"><br>
			Chakra: <span class="personaje_chakra" id="mp">180</span> <img title="Chakra" style=" width: 9px; top: -1px; position: relative; " src="/images/sg/icons/chakra.png"><br>
<!-- 			Reg. Chakra: <span class="personaje_chakra" id="regc">0</span><br> -->
			Nivel: <span id="n">1</span><br>
<!-- 			Estadísticas necesarias: <span id="h">8</span><br> -->
		</div>

          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <table class="buttonstable" style=" margin: auto; ">
    <tbody>
      <tr>
        <td>
          <div class="editstatsbutton" style="text-align: center;"><input class="button" type="button" value="Resetear" onclick="reset()"></div>
        </td>
      </tr>
    </tbody>
  </table>
	</div>
  {$footer}
</body>
<script>
  /* Función para calcular vida del personaje */
  /*
  */
  function calcHp(fuerza, destreza, cchakra, inteligencia, salud, velocidad, tenketsu, sigilo) {
    return (fuerza * 2) + (destreza * 1) + (cchakra * 1) + (inteligencia * 2) + (salud * 10) + (velocidad * 0) + (tenketsu * 5) + (sigilo * 5);
  }
	
  function calcCh(fuerza, destreza, cchakra, inteligencia, salud, velocidad, tenketsu, sigilo) {
	return (fuerza * 1) + (destreza * 2) + (cchakra * 2) + (inteligencia * 1) + (salud * 0) + (velocidad * 10) + (tenketsu * 5) + (sigilo * 5);
  }

  // function calcRegCh(str, res, vel, agi, des, pre, int, cc, niv) {
  //   return Math.round((((str + res + vel + agi + des + pre + int + cc) * 2) / 40) + 1);
  // }

  function statsvalue() {
    nivelvalue(parseInt(fuerza.value), parseInt(destreza.value), parseInt(cchakra.value), parseInt(inteligencia.value));
    vida.innerHTML = calcHp(parseInt(fuerza.value), parseInt(destreza.value), parseInt(cchakra.value), parseInt(inteligencia.value), parseInt(salud.value), parseInt(velocidad.value), parseInt(tenketsu.value), parseInt(sigilo.value));
	chakra.innerHTML = calcCh(parseInt(fuerza.value), parseInt(destreza.value), parseInt(cchakra.value), parseInt(inteligencia.value), parseInt(salud.value), parseInt(velocidad.value), parseInt(tenketsu.value), parseInt(sigilo.value));

	// regchakra.innerHTML = Math.round(calcRegCh(parseInt(fuerza.value), parseInt(res.value), parseInt(vel.value), parseInt(agi.value), parseInt(dex.value), parseInt(pres.value), parseInt(int.value), parseInt(ctrl.value), parseInt(nivelida.value)));
  }

  var fuerza = document.getElementById('fuerza');
  var destreza = document.getElementById('destreza');
  var cchakra = document.getElementById('cchakra');
  var inteligencia = document.getElementById('inteligencia');
  var salud = document.getElementById('salud');
  var velocidad = document.getElementById('velocidad');
  var tenketsu = document.getElementById('tenketsu');
  var sigilo = document.getElementById('sigilo');
  var hab = document.getElementById('h');

  var vida = document.getElementById('hp');
  var aguante = document.getElementById('sp');
  var chakra = document.getElementById('mp');
  var regaguante = document.getElementById('regr');
  var regchakra = document.getElementById('regc');
  var nivelida = document.getElementById('n');
  var hab = document.getElementById('h');

  function nivelvalue(fuerza, destreza, cchakra, inteligencia) {
    var prom = ((fuerza + destreza + cchakra + inteligencia) / 15) + 1;
    nivelida.innerHTML = Math.floor(prom);
    // hab.innerHTML = (parseInt(fuerza.value) + parseInt(res.value) + parseInt(vel.value) + parseInt(agi.value) + parseInt(dex.value) + parseInt(pres.value) + parseInt(int.value) + parseInt(ctrl.value));
  }

  function reset() {
    fuerza.value = 0;
    destreza.value = 0;
    cchakra.value = 0;
    inteligencia.value = 0;
    salud.value = 0;
    velocidad.value = 0;
    tenketsu.value = 0;
    sigilo.value = 0;
    nivelida.innerHTML = 0;
    hab.innerHTML = 0;
    statsvalue()
  }
</script>

</html>
