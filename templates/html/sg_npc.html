<html>

<head>
  <title>NPC</title>
  {$headerinclude}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .sg-npc {
      --bg: #0f0c18; --bg2: #130f1e; --bg3: #171224;
      --border: rgba(156, 107, 204, 0.12);
      --border-strong: rgba(156, 107, 204, 0.22);
      --ink: #e8dff8; --plum: #7b4ab8; --plum2: #9c6bcc; --plum3: #b890e0;
      --stone: #8a7a9a; --mist: #5a4a6a; --oxide: #c0582a; --lavender: #ede0fa;
      max-width: 900px; margin: 24px auto 44px; padding: 0 16px;
      color: var(--ink); font-family: 'Noto Serif JP', serif;
    }

    .sg-npc-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 16%), var(--bg2);
      border: 0.5px solid var(--border); overflow: hidden;
    }

    .sg-npc-back {
      display: inline-flex; align-items: center; gap: 6px; margin-bottom: 14px;
      font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--stone); text-decoration: none;
    }
    .sg-npc-back:hover { color: var(--plum3); }

    /* Hero */
    .sg-npc-hero {
      display: flex; flex-wrap: wrap; gap: 22px; padding: 24px;
      background: var(--bg3); border-bottom: 2px solid var(--accent, var(--plum));
    }
    .sg-npc-portrait {
      position: relative; width: 200px; flex-shrink: 0; aspect-ratio: 3 / 4;
      background: var(--bg); border: 0.5px solid var(--border); overflow: hidden;
    }
    .sg-npc-portrait::before {
      content: '人'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Serif JP', serif; font-size: 72px; color: rgba(156, 107, 204, 0.16);
    }
    .sg-npc-img { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: cover; display: block; }
    .sg-npc-afil {
      position: absolute; z-index: 2; top: 8px; left: 8px; padding: 3px 9px;
      background: var(--accent, var(--plum)); color: #fff;
      font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase;
    }

    .sg-npc-headinfo { flex: 1; min-width: 240px; display: flex; flex-direction: column; gap: 8px; }
    .sg-npc-eyebrow {
      font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent, var(--plum3));
    }
    .sg-npc-name {
      margin: 0; font-family: 'Cinzel', serif; font-size: 26px; font-weight: 900; letter-spacing: 0.5px; color: var(--ink); line-height: 1.05;
    }
    .sg-npc-cargo { color: var(--stone); font-size: 14px; }
    .sg-npc-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .sg-npc-tag {
      padding: 4px 10px; border: 0.5px solid var(--border-strong); color: var(--stone);
      font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .sg-npc-tag--accent { color: #fff; background: var(--accent, var(--plum)); border-color: var(--accent, var(--plum)); }
    .sg-npc-frase {
      margin: 10px 0 0; padding: 10px 14px; border-left: 2px solid var(--accent, var(--plum));
      background: var(--bg); color: var(--lavender); font-size: 14px; line-height: 1.6; font-style: italic;
    }

    /* Bloques */
    .sg-npc-block { padding: 20px 24px; border-bottom: 0.5px solid var(--border); }
    .sg-npc-block:last-child { border-bottom: none; }
    .sg-npc-block-title {
      margin: 0 0 12px; font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--plum3);
    }
    .sg-npc-desc { color: var(--stone); font-size: 14px; line-height: 1.75; }

    /* Estadísticas */
    .sg-npc-stat-group { margin-bottom: 16px; }
    .sg-npc-stat-group:last-child { margin-bottom: 0; }
    .sg-npc-stat-group-t {
      font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--mist); margin-bottom: 8px;
    }
    .sg-npc-stat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px;
    }
    .sg-npc-stat {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 8px 12px; border: 0.5px solid var(--border); background: var(--bg);
    }
    .sg-npc-stat-k {
      font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--stone);
    }
    .sg-npc-stat-v { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 700; color: var(--accent, var(--plum3)); }

    .sg-npc-empty {
      padding: 40px 20px; text-align: center; color: var(--mist); font-size: 15px;
    }
    .sg-npc-empty a { color: var(--plum3); }

    @media (max-width: 640px) {
      .sg-npc-portrait { width: 100%; aspect-ratio: 16 / 10; }
    }
  </style>
</head>

<body>
  {$header}
  <main class="sg-npc">
    <a class="sg-npc-back" href="/sg/npcs.php">← Bingo Book</a>
    <div class="sg-npc-shell">
      {$npc_html}
    </div>
  </main>
  {$footer}

  <script>
    function sgImgFallback(img) {
      if (!img.dataset.fallback) { img.dataset.fallback = '1'; img.src = '/images/sg/objeto_default.png'; }
      else { img.style.display = 'none'; }
    }
  </script>
</body>

</html>
