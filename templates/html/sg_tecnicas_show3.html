<html>
<head>
  <title>Tecnicas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Source+Serif+4:wght@300;400;600;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
  {$headerinclude}
  <style>
    :root {
      --sg-page-bg: #0f0c18;
      --sg-page-bg2: #130f1e;
      --sg-page-bg3: #171224;
      --sg-page-border: rgba(156, 107, 204, 0.12);
      --sg-page-ink: #e8dff8;
      --sg-page-stone: #8a7a9a;
      --sg-page-mist: #5a4a6a;
      --sg-page-plum: #d4b8f0;
      --sg-page-oxide: #c0582a;
      --sg-page-fiber: rgba(156, 107, 204, 0.04);
      --sg-page-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
      --sg-page-soft-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
    }

    body {
      margin: 0;
      background: var(--sg-page-bg);
      color: var(--sg-page-ink);
      font-family: "Source Serif 4", serif;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(13deg, transparent 0, transparent 24px, var(--sg-page-fiber) 24px, var(--sg-page-fiber) 25px),
        repeating-linear-gradient(82deg, transparent 0, transparent 36px, var(--sg-page-fiber) 36px, var(--sg-page-fiber) 37px),
        repeating-linear-gradient(151deg, transparent 0, transparent 19px, var(--sg-page-fiber) 19px, var(--sg-page-fiber) 19.5px);
    }

    .sg-tree-page {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 28px auto 44px;
      padding: 0 18px;
    }

    .sg-tree-shell {
      border: 1px solid var(--sg-page-border);
      background: rgba(19, 15, 30, 0.96);
      box-shadow: var(--sg-page-shadow);
      overflow: hidden;
    }

    .sg-tree-head {
      position: relative;
      padding: 26px 30px 22px;
      border-bottom: 1px solid var(--sg-page-border);
      background: rgba(23, 18, 36, 0.96);
    }

    .sg-tree-head::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(123, 74, 184, 0.06), transparent 24%),
        linear-gradient(0deg, rgba(192, 88, 42, 0.04), transparent 34%);
    }

    .sg-tree-head-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .sg-tree-kanji {
      font: 700 34px/0.8 "Zen Old Mincho", serif;
      writing-mode: vertical-rl;
      letter-spacing: 6px;
      color: rgba(212, 184, 240, 0.18);
      user-select: none;
    }

    .sg-tree-label {
      margin-bottom: 8px;
      color: var(--sg-page-oxide);
      font: 700 10px/1 "Cinzel", serif;
      letter-spacing: 2.4px;
      text-transform: uppercase;
    }

    .sg-tree-title {
      margin: 0;
      color: var(--sg-page-ink);
      font: 900 clamp(28px, 4vw, 40px)/1 "Cinzel", serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .sg-tree-copy {
      max-width: 820px;
      margin: 12px 0 0;
      color: var(--sg-page-stone);
      font-size: 15px;
      line-height: 1.82;
      text-align: justify;
    }

    .sg-tree-body {
      padding: 20px;
    }

    .sg-tree-stack {
      display: grid;
      gap: 12px;
    }

    .sg-tree-empty {
      padding: 18px 20px;
      border: 1px solid rgba(156, 107, 204, 0.08);
      background: rgba(20, 16, 31, 0.82);
      color: var(--sg-page-stone);
      font-size: 14px;
      line-height: 1.7;
      text-align: center;
    }

    .sg-tree-root > .sg-spoiler__toggle {
      min-height: 58px;
      background: rgba(28, 22, 44, 0.96);
    }

    .sg-tree-branch > .sg-spoiler__toggle {
      background: rgba(24, 19, 37, 0.96);
    }

    .sg-tree-category > .sg-spoiler__toggle {
      background: rgba(22, 18, 34, 0.96);
    }

    .sg-tree-root > .sg-spoiler__panel > .sg-spoiler__body > .sg-spoiler__content {
      padding: 12px;
      background: rgba(10, 9, 16, 0.82);
    }

    .sg-tree-branch > .sg-spoiler__panel > .sg-spoiler__body > .sg-spoiler__content,
    .sg-tree-category > .sg-spoiler__panel > .sg-spoiler__body > .sg-spoiler__content {
      padding: 10px;
      background: rgba(12, 10, 18, 0.78);
    }

    .sg-tree-technique > .sg-spoiler__toggle {
      min-height: 52px;
    }

    .sg-tree-technique > .sg-spoiler__toggle .sg-spoiler__title {
      font-size: 11px;
      letter-spacing: 1.2px;
    }

    .sg-tree-technique > .sg-spoiler__toggle .sg-spoiler__eyebrow {
      color: #c7a796;
    }

    .sg-tree-technique > .sg-spoiler__panel > .sg-spoiler__body > .sg-spoiler__content {
      padding: 14px;
    }

    @media (max-width: 720px) {
      .sg-tree-page {
        margin-top: 20px;
        padding: 0 12px;
      }

      .sg-tree-head {
        padding: 20px 18px 16px;
      }

      .sg-tree-head-inner {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .sg-tree-kanji {
        display: none;
      }

      .sg-tree-body {
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  {$header}

  <div class="sg-tree-page">
    <div class="sg-tree-shell">
      <section class="sg-tree-head">
        <div class="sg-tree-head-inner">
          <div class="sg-tree-kanji">秘術</div>
          <div>
            <div class="sg-tree-label">Árbol de técnicas</div>
            <h1 class="sg-tree-title">{$arbol}</h1>
            <if $clan_desc then>
              <p class="sg-tree-copy">{$clan_desc}</p>
            <else>
              <p class="sg-tree-copy">Este repertorio organiza el árbol completo por ramas y categorías para que cada técnica pueda consultarse con una lectura clara, compacta y reusable dentro del foro.</p>
            </if>
          </div>
        </div>
      </section>

      <section class="sg-tree-body">
        <div id="sg-tree-root" class="sg-tree-stack"></div>
      </section>
    </div>
  </div>

  {$footer}
</body>

<script>
var sgIsStaff = !!'{$g_is_staff}';
var sgBaseJson = '{$tecs_base_json}';
var sgBranch1Json = '{$tecs_rama1_json}';
var sgBranch2Json = '{$tecs_rama2_json}';
var sgBranch3Json = '{$tecs_rama3_json}';

var sgBaseTechniques = sgBaseJson ? JSON.parse(sgBaseJson) : [];
var sgBranch1 = sgBranch1Json ? JSON.parse(sgBranch1Json) : {};
var sgBranch2 = sgBranch2Json ? JSON.parse(sgBranch2Json) : {};
var sgBranch3 = sgBranch3Json ? JSON.parse(sgBranch3Json) : {};

function sgToggleSpoiler(button) {
  var wrapper = button.parentNode;
  if (!wrapper || !wrapper.classList.contains('sg-spoiler')) {
    return;
  }

  var isOpen = wrapper.classList.contains('is-open');
  wrapper.classList.toggle('is-open', !isOpen);
  button.setAttribute('aria-expanded', !isOpen ? 'true' : 'false');
}

function sgCreateSpoiler(config) {
  var openClass = config.open ? ' is-open' : '';
  var countMarkup = config.count ? '<span class="sg-spoiler__count">' + config.count + '</span>' : '';
  var eyebrowMarkup = config.eyebrow ? '<span class="sg-spoiler__eyebrow">' + config.eyebrow + '</span>' : '';
  var contentHtml = config.content || '';

  return ''
    + '<div class="sg-spoiler ' + config.classes + openClass + '">'
    +   '<button class="sg-spoiler__toggle" type="button" onclick="sgToggleSpoiler(this)" aria-expanded="' + (config.open ? 'true' : 'false') + '">'
    +     '<span class="sg-spoiler__lead">'
    +       '<span class="sg-spoiler__icon">' + config.icon + '</span>'
    +       '<span class="sg-spoiler__titles">'
    +         eyebrowMarkup
    +         '<span class="sg-spoiler__title">' + config.title + '</span>'
    +       '</span>'
    +     '</span>'
    +     '<span class="sg-spoiler__aside">'
    +       countMarkup
    +       '<span class="sg-spoiler__caret">+</span>'
    +     '</span>'
    +   '</button>'
    +   '<div class="sg-spoiler__panel">'
    +     '<div class="sg-spoiler__body">'
    +       '<div class="sg-spoiler__content">' + contentHtml + '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';
}

function sgHumanizeCategory(slug) {
  return slug.replace(/_/g, ' ');
}

function sgCountCategories(branchData) {
  return Object.keys(branchData).length;
}

function sgHasAnyTechniques() {
  return !!(
    (sgBaseTechniques && sgBaseTechniques.length) ||
    sgCountCategories(sgBranch1) ||
    sgCountCategories(sgBranch2) ||
    sgCountCategories(sgBranch3)
  );
}

function sgCreateBadge(icon, text, accent) {
  if (!text) {
    return '';
  }

  var accentClass = accent ? ' sg-technique__badge--accent' : '';
  return ''
    + '<div class="sg-technique__badge' + accentClass + '">'
    +   '<span class="sg-technique__badge-icon">' + icon + '</span>'
    +   text
    + '</div>';
}

function sgCreateTechniqueCard(tecnica) {
  var badges = [];
  var description = tecnica.descripcion ? tecnica.descripcion : 'Sin descripción disponible.';
  var effectText = tecnica.efecto ? tecnica.efecto : 'No tiene efecto adicional especificado.';
  var costText = tecnica.coste ? tecnica.coste : 'Sin coste indicado';

  if (tecnica.rango) {
    badges.push(sgCreateBadge('◆', 'Rango ' + tecnica.rango, true));
  }
  if (tecnica.requisito) {
    badges.push(sgCreateBadge('•', tecnica.requisito, false));
  }
  if (tecnica.tipo) {
    badges.push(sgCreateBadge('◌', tecnica.tipo, false));
  }
  if (tecnica.categoria && tecnica.categoria != tecnica.tipo) {
    badges.push(sgCreateBadge('◈', tecnica.categoria, false));
  }
  if (tecnica.sellos) {
    badges.push(sgCreateBadge('✦', 'Sellos: ' + tecnica.sellos, false));
  }
  if (tecnica.tid) {
    if (sgIsStaff) {
      badges.push(sgCreateBadge('#', 'ID: <a href="/sg/admin/modificar_tecnicas.php?tecnica_id=' + tecnica.tid + '">' + tecnica.tid + '</a>', false));
    } else {
      badges.push(sgCreateBadge('#', 'ID: ' + tecnica.tid, false));
    }
  }
  if (tecnica.balance == 1) {
    badges.push(sgCreateBadge('+', 'Balance positivo ✓', false));
  } else if (tecnica.balance == 2) {
    badges.push(sgCreateBadge('-', 'Balance negativo ✖', false));
  }

  return ''
    + '<div class="sg-technique">'
    +   '<div class="sg-technique__rail">'
    +     (badges.length ? '<div class="sg-technique__badges">' + badges.join('') + '</div>' : '')
    +     '<div class="sg-technique__stat">'
    +       '<div class="sg-technique__stat-label"><span class="sg-technique__label-icon">◔</span>Coste</div>'
    +       '<div class="sg-technique__stat-value">' + costText + '</div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="sg-technique__main">'
    +     '<div class="sg-technique__section">'
    +       '<div class="sg-technique__section-label"><span class="sg-technique__label-icon">▣</span>Descripción</div>'
    +       '<p class="sg-technique__text">' + description + '</p>'
    +     '</div>'
    +     '<div class="sg-technique__section">'
    +       '<div class="sg-technique__section-label"><span class="sg-technique__label-icon">✧</span>Efecto</div>'
    +       '<div class="sg-technique__text' + (tecnica.efecto ? '' : ' sg-technique__text--muted') + '">' + effectText + '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';
}

function sgCreateTechniqueSpoiler(tecnica) {
  return sgCreateSpoiler({
    classes: 'sg-spoiler--warm sg-tree-technique',
    icon: '●',
    eyebrow: 'Técnica',
    title: tecnica.nombre,
    open: false,
    content: sgCreateTechniqueCard(tecnica)
  });
}

function sgCreateCategorySpoiler(categoryKey, techniques) {
  var content = '';
  var i = 0;

  for (i = 0; i < techniques.length; i++) {
    content += sgCreateTechniqueSpoiler(techniques[i]);
  }

  return sgCreateSpoiler({
    classes: 'sg-tree-category',
    icon: '◈',
    eyebrow: 'Categoría',
    title: sgHumanizeCategory(categoryKey),
    count: techniques.length + ' tecnicas',
    open: false,
    content: content
  });
}

function sgCreateBranchSpoiler(title, branchData, icon, openByDefault) {
  var categoryKeys = Object.keys(branchData);
  var content = '';
  var i = 0;

  for (i = 0; i < categoryKeys.length; i++) {
    content += sgCreateCategorySpoiler(categoryKeys[i], branchData[categoryKeys[i]]);
  }

  return sgCreateSpoiler({
    classes: 'sg-tree-branch',
    icon: icon,
    eyebrow: 'Rama',
    title: title,
    count: categoryKeys.length + ' categorias',
    open: openByDefault,
    content: content
  });
}

function sgCreateBaseSpoiler() {
  var content = '';
  var i = 0;

  for (i = 0; i < sgBaseTechniques.length; i++) {
    content += sgCreateTechniqueSpoiler(sgBaseTechniques[i]);
  }

  return sgCreateSpoiler({
    classes: 'sg-tree-branch',
    icon: '◎',
    eyebrow: 'Base',
    title: 'Jutsu base del arbol',
    count: sgBaseTechniques.length + ' tecnicas',
    open: true,
    content: content
  });
}

function sgRenderTree() {
  var root = document.getElementById('sg-tree-root');
  var content = '';
  var treeTitle = '';

  if (!root) {
    return;
  }

  treeTitle = document.getElementsByClassName('sg-tree-title')[0].textContent;

  if (!sgHasAnyTechniques()) {
    root.innerHTML = '<div class="sg-tree-empty">No hay tecnicas disponibles en este arbol por ahora.</div>';
    return;
  }

  if (sgBaseTechniques && sgBaseTechniques.length) {
    content += sgCreateBaseSpoiler();
  }
  if (sgCountCategories(sgBranch1)) {
    content += sgCreateBranchSpoiler('Rama 1', sgBranch1, '◇', false);
  }
  if (sgCountCategories(sgBranch2)) {
    content += sgCreateBranchSpoiler('Rama 2', sgBranch2, '◇', false);
  }
  if (sgCountCategories(sgBranch3)) {
    content += sgCreateBranchSpoiler('Rama 3', sgBranch3, '◇', false);
  }

  root.innerHTML = sgCreateSpoiler({
    classes: 'sg-tree-root',
    icon: '✦',
    eyebrow: 'Arbol',
    title: treeTitle,
    open: true,
    content: content
  });
}

window.addEventListener('load', sgRenderTree);
</script>
</html>
