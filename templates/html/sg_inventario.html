<html>

<head>
  <title>Inventario</title>
  {$headerinclude}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .sg-inv-page {
      --bg: #0f0c18; --bg2: #130f1e; --bg3: #171224;
      --border: rgba(156, 107, 204, 0.12);
      --border-strong: rgba(156, 107, 204, 0.22);
      --ink: #e8dff8; --plum: #7b4ab8; --plum2: #9c6bcc; --plum3: #b890e0;
      --stone: #8a7a9a; --mist: #5a4a6a; --oxide: #c0582a; --lavender: #ede0fa;
      max-width: 1100px;
      margin: 24px auto 44px;
      padding: 0 16px;
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
    }

    .sg-inv-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 16%), var(--bg2);
      border: 0.5px solid var(--border);
      overflow: hidden;
    }

    .sg-inv-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px 20px;
      padding: 20px 24px;
      background: var(--bg3);
      border-bottom: 0.5px solid var(--border);
    }

    .sg-inv-titles { display: flex; align-items: center; gap: 12px; }
    .sg-inv-titles::before {
      content: '';
      width: 3px;
      height: 26px;
      background: var(--oxide);
      flex-shrink: 0;
    }

    .sg-inv-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--plum3);
    }

    .sg-inv-title {
      margin: 2px 0 0;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1;
    }

    .sg-inv-count {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--stone);
    }

    .sg-inv-search {
      margin-left: auto;
      width: 240px;
      max-width: 100%;
      height: 38px;
      padding: 0 12px;
      background: var(--bg);
      border: 0.5px solid var(--border-strong);
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
      font-size: 14px;
      box-sizing: border-box;
    }
    .sg-inv-search:focus { outline: none; border-color: var(--plum3); }

    .sg-inv-body { padding: 22px 24px; }

    /* Grupos por tipo */
    .sg-inv-group { margin-bottom: 26px; }
    .sg-inv-group:last-child { margin-bottom: 0; }

    .sg-inv-group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--plum3);
    }
    .sg-inv-group-title::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }

    .sg-inv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* Tarjeta de objeto */
    .sg-item {
      display: flex;
      flex-direction: column;
      border: 0.5px solid var(--border);
      background: var(--bg);
      overflow: hidden;
    }

    .sg-item-media {
      position: relative;
      aspect-ratio: 16 / 10;
      background: var(--bg3);
      overflow: hidden;
    }

    /* Marcador detrás de la imagen (visible solo si la imagen no carga) */
    .sg-item-media::before {
      content: '物';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif JP', serif;
      font-size: 46px;
      color: rgba(156, 107, 204, 0.18);
      pointer-events: none;
    }

    .sg-item-img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: var(--bg3);
    }

    .sg-item-qty {
      position: absolute;
      bottom: 8px;
      right: 8px;
      padding: 3px 9px;
      background: rgba(15, 12, 24, 0.86);
      border: 0.5px solid var(--border-strong);
      color: var(--plum3);
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sg-item-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 13px;
    }

    .sg-item-name {
      margin: 0;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.6px;
      color: var(--ink);
    }

    .sg-item-badges { display: flex; flex-wrap: wrap; gap: 6px; }

    .sg-item-badge {
      padding: 2px 8px;
      border: 0.5px solid var(--border-strong);
      color: var(--plum3);
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.3px;
      text-transform: uppercase;
    }
    .sg-item-badge--soft { color: var(--stone); border-color: var(--border); }

    .sg-item-desc {
      margin: 0;
      color: var(--stone);
      font-size: 13px;
      line-height: 1.6;
    }

    .sg-item-effect {
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--ink);
    }
    .sg-item-eff-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--mist);
    }

    .sg-item-code {
      margin-top: 2px;
      padding: 6px 8px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      color: var(--plum3);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: all;
    }
    .sg-item-code:hover { border-color: var(--plum3); }

    .sg-inv-empty,
    .sg-inv-noresults {
      padding: 36px 20px;
      text-align: center;
      color: var(--mist);
      font-size: 14px;
      border: 0.5px solid var(--border);
      background: var(--bg);
    }
    .sg-inv-noresults { display: none; margin-top: 12px; }

    @media (max-width: 640px) {
      .sg-inv-search { margin-left: 0; width: 100%; }
      .sg-inv-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>

<body>
  {$header}
  <main class="sg-inv-page">
    <div class="sg-inv-shell">
      <div class="sg-inv-header">
        <div class="sg-inv-titles">
          <div>
            <div class="sg-inv-eyebrow">Inventario</div>
            <h1 class="sg-inv-title"><a href="/sg/ficha.php?uid={$uid}" style="color: inherit; text-decoration: none;">{$owner_nombre}</a></h1>
          </div>
        </div>
        <span class="sg-inv-count">{$total} objetos · {$unidades} unidades</span>
        <input class="sg-inv-search" type="text" id="sg-inv-search" placeholder="Buscar objeto o tipo…" oninput="sgFilterInventario()">
      </div>

      <div class="sg-inv-body" id="sg-inv-body">
        {$objetos_html}
        <div class="sg-inv-noresults" id="sg-inv-noresults">Ningún objeto coincide con la búsqueda.</div>
      </div>
    </div>
  </main>
  {$footer}

  <script>
    function sgImgFallback(img) {
      if (!img.dataset.fallback) {
        // 1er fallo: intenta la imagen por defecto
        img.dataset.fallback = '1';
        img.src = '/images/sg/objeto_default.png';
      } else {
        // 2do fallo (ni la imagen ni la default existen): muestra el marcador 物
        img.style.display = 'none';
      }
    }

    function sgSelectText(el) {
      if (window.getSelection && document.createRange) {
        var range = document.createRange();
        range.selectNodeContents(el);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }

    function sgFilterInventario() {
      var q = document.getElementById('sg-inv-search').value.trim().toLowerCase();
      var items = document.querySelectorAll('.sg-item');
      var visibles = 0;
      items.forEach(function (item) {
        var name = item.getAttribute('data-name') || '';
        var tipo = item.getAttribute('data-tipo') || '';
        var match = q === '' || name.indexOf(q) !== -1 || tipo.indexOf(q) !== -1;
        item.style.display = match ? '' : 'none';
        if (match) visibles++;
      });

      // Oculta grupos sin objetos visibles
      document.querySelectorAll('.sg-inv-group').forEach(function (group) {
        var any = group.querySelector('.sg-item:not([style*="display: none"])');
        group.style.display = any ? '' : 'none';
      });

      var nores = document.getElementById('sg-inv-noresults');
      if (nores) { nores.style.display = (visibles === 0) ? 'block' : 'none'; }
    }
  </script>
</body>

</html>
