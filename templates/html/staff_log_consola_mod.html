<html>

<head>
  <title>Consola Súper Secreta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Source+Serif+4:wght@300;400;600;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
  {$headerinclude}
  <style>
    :root {
      --bg: #0f0c18;
      --bg2: #130f1e;
      --surface: rgba(23, 18, 36, 0.84);
      --border: rgba(156, 107, 204, 0.12);
      --ink: #e8dff8;
      --plum3: #b890e0;
      --stone: #8a7a9a;
      --fiber: rgba(156, 107, 204, 0.04);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(123, 74, 184, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(192, 88, 42, 0.08), transparent 24%),
        var(--bg);
      color: var(--ink);
      font-family: "Source Serif 4", serif;
      margin: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        repeating-linear-gradient(13deg, transparent 0, transparent 24px, var(--fiber) 24px, var(--fiber) 25px),
        repeating-linear-gradient(82deg, transparent 0, transparent 36px, var(--fiber) 36px, var(--fiber) 37px),
        repeating-linear-gradient(151deg, transparent 0, transparent 19px, var(--fiber) 19px, var(--fiber) 19.5px);
    }

    .staff-log-page {
      max-width: 1040px;
      margin: 28px auto 44px;
      padding: 0 18px;
      position: relative;
      z-index: 1;
    }

    .staff-log-shell {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: rgba(19, 15, 30, 0.94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .staff-log-head {
      padding: 22px 26px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(23, 18, 36, 0.82);
    }

    .staff-log-label {
      margin-bottom: 8px;
      font: 700 10px/1 "Cinzel", serif;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      color: var(--plum3);
    }

    .staff-log-title {
      margin: 0;
      font: 900 26px/1.05 "Cinzel", serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink);
    }

    .staff-log-copy {
      margin: 10px 0 0;
      color: var(--stone);
      font-size: 14px;
      line-height: 1.7;
    }

    .staff-log-body {
      padding: 18px;
    }

    .staff-log-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .staff-log-list li {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--ink);
      line-height: 1.75;
    }
  </style>
</head>

<body>
  {$header}
  <div class="staff-log-page">
    <div class="staff-log-shell">
      <section class="staff-log-head">
        <div class="staff-log-label">Registro interno</div>
        <h1 class="staff-log-title">Log de Consola</h1>
        <p class="staff-log-copy">Historial de cambios y movimientos realizados desde la consola de moderación.</p>
      </section>
      <section class="staff-log-body">
        <ul class="staff-log-list">
          {$logs_li}
        </ul>
      </section>
    </div>
  </div>
  {$footer}
</body>


</html>
