<section class="sg-profile-private">
  <div class="sg-profile-panel sg-profile-panel--techniques">
    <div class="sg-profile-panel__head">
      <h2>Técnicas y Progreso</h2>
      <span class="sg-profile-meta-pill">Sección pública</span>
    </div>
    <div class="sg-profile-panel__body sg-profile-private-stack">
      <div class="sg-profile-private-grid">
        <div class="sg-profile-private-item">
          <span class="sg-profile-private-item__label">Slots restantes</span>
          <span class="sg-profile-private-item__value">{$ficha['slots']}</span>
        </div>
        <div class="sg-profile-private-item">
          <span class="sg-profile-private-item__label">Límite de nivel</span>
          <span class="sg-profile-private-item__value">{$ficha['limite_nivel']}</span>
        </div>
        <div class="sg-profile-private-item">
          <span class="sg-profile-private-item__label">Límite de clase</span>
          <span class="sg-profile-private-item__value" id="sg-profile-class-limit">E</span>
        </div>
      </div>

      <div class="sg-profile-panel sg-profile-panel--inner">
        <div class="sg-profile-panel__head">
          <h3>Técnicas Aprendidas</h3>
        </div>
        <div class="sg-profile-panel__body">
          <div class="sg-profile-techniques-toolbar">
            <div class="sg-profile-techniques-toolbar__meta">
              <span class="sg-profile-techniques-toolbar__eyebrow">Biblioteca</span>
              <strong id="sg-profile-technique-count">0 técnicas</strong>
            </div>
            <button type="button" id="sg-profile-filter-toggle" class="sg-profile-filter-toggle" onclick="sgFichaToggleTechniqueFilters()">
              Filtro
            </button>
          </div>
          <div id="sg-profile-technique-filters" class="sg-profile-technique-filters" aria-hidden="true">
            <div class="sg-profile-technique-filters__grid">
              <input type="text" id="sg-profile-technique-search" class="sg-profile-technique-search" placeholder="Buscar por nombre, ID, tipo o requisito" oninput="sgFichaApplyTechniqueFilters()">
              <select id="sg-profile-technique-family" class="sg-profile-technique-select" onchange="sgFichaApplyTechniqueFilters()">
                <option value="">Todas las familias</option>
              </select>
              <select id="sg-profile-technique-rank" class="sg-profile-technique-select" onchange="sgFichaApplyTechniqueFilters()">
                <option value="">Todos los rangos</option>
              </select>
            </div>
          </div>
          <div id="sg-profile-techniques" class="sg-profile-techniques"></div>
        </div>
      </div>

      <if $sgFichaCanViewStaffNotes then>
        <div class="sg-profile-panel sg-profile-panel--inner">
          <div class="sg-profile-panel__head">
            <h3>Anotaciones de Staff</h3>
            <span class="sg-profile-meta-pill">Privado</span>
          </div>
          <div class="sg-profile-panel__body">
            <div class="sg-profile-notes">
              <textarea disabled>{$ficha['notas']}</textarea>
            </div>
          </div>
        </div>
      </if>

      {$fichaprivate_script}
    </div>
  </div>
</section>
