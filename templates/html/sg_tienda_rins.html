<html>

<head>
  <title>Tienda de Rins</title>
  {$headerinclude}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .sg-cat-page {
      --bg: #0f0c18; --bg2: #130f1e; --bg3: #171224;
      --border: rgba(156, 107, 204, 0.12);
      --border-strong: rgba(156, 107, 204, 0.22);
      --ink: #e8dff8; --plum: #7b4ab8; --plum2: #9c6bcc; --plum3: #b890e0;
      --stone: #8a7a9a; --mist: #5a4a6a; --oxide: #c0582a; --lavender: #ede0fa;
      --gold: #c09840; --green: #4f9d69;
      max-width: 1100px;
      margin: 24px auto 44px;
      padding: 0 16px;
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
    }

    .sg-cat-shell {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 16%), var(--bg2);
      border: 0.5px solid var(--border);
      overflow: hidden;
    }

    .sg-cat-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      padding: 20px 24px;
      background: var(--bg3);
      border-bottom: 0.5px solid var(--border);
    }

    .sg-cat-titles { display: flex; align-items: center; gap: 12px; margin-right: auto; }
    .sg-cat-titles::before {
      content: '';
      width: 3px;
      height: 26px;
      background: var(--oxide);
      flex-shrink: 0;
    }

    .sg-cat-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 8px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--plum3);
    }
    .sg-cat-title {
      margin: 2px 0 0;
      font-family: 'Cinzel', serif;
      font-size: 18px; font-weight: 900; letter-spacing: 1px;
      text-transform: uppercase; color: var(--ink); line-height: 1;
    }

    .sg-balance {
      display: inline-flex;
      align-items: baseline;
      gap: 7px;
      padding: 8px 14px;
      border: 0.5px solid var(--border-strong);
      background: var(--bg);
    }
    .sg-balance--rin { border-color: rgba(156,107,204,0.45); background: rgba(123,74,184,0.12); }
    .sg-balance-label {
      font-family: 'Cinzel', serif;
      font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--mist);
    }
    .sg-balance-value { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--plum3); }
    .sg-balance--rin .sg-balance-value { color: #d4b8f0; }

    .sg-cat-body { padding: 22px 24px; }

    .sg-msg {
      margin-bottom: 18px;
      padding: 12px 14px;
      border: 0.5px solid var(--border-strong);
      border-left-width: 2px;
      font-size: 14px; line-height: 1.6; color: var(--ink);
    }
    .sg-msg--ok { border-left-color: var(--green); background: rgba(79, 157, 105, 0.12); }
    .sg-msg--error { border-left-color: var(--oxide); background: rgba(192, 88, 42, 0.12); }

    .sg-section-label {
      margin: 26px 0 12px;
      font-family: 'Cinzel', serif;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--plum3);
      display: flex; align-items: center; gap: 10px;
    }
    .sg-section-label:first-child { margin-top: 0; }
    .sg-section-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

    /* Cambio de moneda */
    .sg-conv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }
    .sg-conv-card {
      border: 0.5px solid var(--border);
      background: var(--bg);
      padding: 16px;
    }
    .sg-conv-title {
      font-family: 'Cinzel', serif;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--ink);
    }
    .sg-conv-rate { margin-top: 4px; font-size: 13px; color: var(--stone); }
    .sg-conv-preview { margin-top: 8px; font-size: 12px; color: var(--gold); min-height: 16px; }

    /* Grid pergaminos */
    .sg-cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    .sg-item { display: flex; flex-direction: column; border: 0.5px solid var(--border); background: var(--bg); overflow: hidden; }
    .sg-item-media { position: relative; aspect-ratio: 16 / 10; background: var(--bg3); overflow: hidden; }
    .sg-item-media::before {
      content: '物'; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Serif JP', serif; font-size: 46px;
      color: rgba(156, 107, 204, 0.18); pointer-events: none;
    }
    .sg-item-img { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: cover; display: block; background: var(--bg3); }
    .sg-item-cost {
      position: absolute; bottom: 8px; right: 8px;
      padding: 3px 9px; background: rgba(15, 12, 24, 0.86);
      border: 0.5px solid rgba(156,107,204,0.45);
      color: #d4b8f0; font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700;
    }

    .sg-item-body { display: flex; flex-direction: column; gap: 8px; padding: 12px 13px; }
    .sg-item-name { margin: 0; font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700; letter-spacing: 0.6px; color: var(--ink); }
    .sg-item-badges { display: flex; flex-wrap: wrap; gap: 6px; }
    .sg-item-badge {
      padding: 2px 8px; border: 0.5px solid var(--border-strong); color: var(--plum3);
      font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase;
    }
    .sg-item-badge--soft { color: var(--stone); border-color: var(--border); }
    .sg-item-desc { margin: 0; color: var(--stone); font-size: 13px; line-height: 1.6; }
    .sg-item-effect { font-size: 12.5px; line-height: 1.6; color: var(--ink); }
    .sg-item-eff-label {
      font-family: 'Cinzel', serif; font-size: 8px; font-weight: 700; letter-spacing: 1.3px;
      text-transform: uppercase; color: var(--mist);
    }
    .sg-item-meta { font-size: 11px; color: var(--mist); }
    .sg-item-meta strong { color: var(--plum3); }

    .sg-buy, .sg-conv-form {
      display: flex; gap: 8px; margin-top: 4px; padding-top: 10px;
      border-top: 0.5px solid var(--border);
    }
    .sg-conv-form { border-top: none; padding-top: 12px; }
    .sg-buy-qty {
      width: 58px; height: 36px; padding: 4px 8px;
      background: var(--bg2); border: 0.5px solid var(--border-strong);
      color: var(--ink); font-family: 'Noto Serif JP', serif; font-size: 13px;
      text-align: center; box-sizing: border-box;
    }
    .sg-buy-qty:focus { outline: none; border-color: var(--plum3); }

    .sg-btn {
      flex: 1; display: inline-flex; align-items: center; justify-content: center;
      height: 36px; padding: 0 16px; background: var(--plum); border: none;
      color: var(--lavender); font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: background 0.15s;
    }
    .sg-btn:hover { background: var(--plum2); }

    .sg-buy-status {
      margin-top: 4px; padding-top: 10px; border-top: 0.5px solid var(--border);
      font-family: 'Cinzel', serif; font-size: 9px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase;
    }
    .sg-buy-status--max { color: var(--green); }
    .sg-buy-status--no { color: var(--oxide); }

    .sg-cat-empty {
      padding: 36px 20px; text-align: center; color: var(--mist);
      font-size: 14px; border: 0.5px solid var(--border); background: var(--bg);
    }

    @media (max-width: 640px) {
      .sg-cat-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>

<body>
  {$header}
  <main class="sg-cat-page">
    <div class="sg-cat-shell">
      <div class="sg-cat-header">
        <div class="sg-cat-titles">
          <div>
            <div class="sg-cat-eyebrow">Tienda de Rins</div>
            <h1 class="sg-cat-title">Mercado del Rin</h1>
          </div>
        </div>
        <span class="sg-balance sg-balance--rin"><span class="sg-balance-label">Rin</span><span class="sg-balance-value">{$rin_label}</span></span>
        <span class="sg-balance"><span class="sg-balance-label">Ryos</span><span class="sg-balance-value">{$ryos_label}</span></span>
        <span class="sg-balance"><span class="sg-balance-label">Tobi</span><span class="sg-balance-value">{$tobi_label}</span></span>
      </div>

      <div class="sg-cat-body">
        <if $msg_ok != '' then><div class="sg-msg sg-msg--ok">{$msg_ok}</div></if>
        <if $msg_error != '' then><div class="sg-msg sg-msg--error">{$msg_error}</div></if>

        <!-- Cambio de moneda -->
        <div class="sg-section-label">Cambio de moneda</div>
        <div class="sg-conv-grid">
          <div class="sg-conv-card">
            <div class="sg-conv-title">Ryos</div>
            <div class="sg-conv-rate">10 Rin → 50 Ryos por paquete</div>
            <form method="post" action="/sg/tienda_rins.php" class="sg-conv-form">
              <input type="hidden" name="accion" value="cambiar_ryos">
              <input class="sg-buy-qty" type="number" name="cantidad" min="1" value="1" data-rin="10" data-gana="50" data-moneda="Ryos" oninput="sgConvCalc(this)">
              <button class="sg-btn" type="submit">Comprar Ryos</button>
            </form>
            <div class="sg-conv-preview"></div>
          </div>

          <div class="sg-conv-card">
            <div class="sg-conv-title">Tobis</div>
            <div class="sg-conv-rate">50 Rin → 1 Tobi por paquete</div>
            <form method="post" action="/sg/tienda_rins.php" class="sg-conv-form">
              <input type="hidden" name="accion" value="cambiar_tobi">
              <input class="sg-buy-qty" type="number" name="cantidad" min="1" value="1" data-rin="50" data-gana="1" data-moneda="Tobi" oninput="sgConvCalc(this)">
              <button class="sg-btn" type="submit">Comprar Tobis</button>
            </form>
            <div class="sg-conv-preview"></div>
          </div>
        </div>

        <!-- Pergaminos -->
        <div class="sg-section-label">Pergaminos</div>
        <div class="sg-cat-grid">
          {$pergaminos_html}
        </div>
      </div>
    </div>
  </main>
  {$footer}

  <script>
    function sgImgFallback(img) {
      if (!img.dataset.fallback) {
        img.dataset.fallback = '1';
        img.src = '/images/sg/objeto_default.png';
      } else {
        img.style.display = 'none';
      }
    }

    function sgConvCalc(input) {
      var n = parseInt(input.value, 10);
      var card = input.closest('.sg-conv-card');
      var prev = card ? card.querySelector('.sg-conv-preview') : null;
      if (!prev) { return; }
      if (!n || n < 1) { prev.textContent = ''; return; }
      var rin = parseInt(input.dataset.rin, 10) * n;
      var gana = parseInt(input.dataset.gana, 10) * n;
      prev.textContent = '−' + rin + ' Rin  →  +' + gana + ' ' + input.dataset.moneda;
    }

    // Inicializa los previews
    document.querySelectorAll('.sg-conv-card .sg-buy-qty').forEach(sgConvCalc);
  </script>
</body>

</html>
