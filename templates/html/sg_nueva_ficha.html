<html>

<head>
  <title>Ficha Nueva</title>
  {$headerinclude}
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f4f2f8;
      --bg2:      #ede9f4;
      --bg3:      #e6e1f0;
      --border:   rgba(90, 46, 154, 0.14);
      --ink:      #1e1428;
      --plum:     #3d1f6e;
      --plum2:    #5a2e9a;
      --plum3:    #7b4ab8;
      --plum4:    #9c6bcc;
      --lilac:    #c4a0e0;
      --lavender: #ede0fa;
      --oxide:    #7a2a10;
      --oxide2:   #a83a18;
      --stone:    #6a587a;
      --mist:     #a898b8;
      --fiber:    rgba(140, 120, 180, 0.06);
    }

    [data-theme="dark"] {
      --bg:     #0f0c18;
      --bg2:    #130f1e;
      --bg3:    #171224;
      --bg4:    #1c162c;
      --border: rgba(156, 107, 204, 0.12);
      --ink:    #e8dff8;
      --plum:   #7b4ab8;
      --plum2:  #9c6bcc;
      --plum3:  #b890e0;
      --plum4:  #d4b8f0;
      --dim:    #4a3a6a;
      --oxide:  #c0582a;
      --oxide2: #e07040;
      --stone:  #8a7a9a;
      --mist:   #5a4a6a;
      --fiber:  rgba(156, 107, 204, 0.04);
    }

    /* ── Form wrapper ── */
    #newfichaform {
      color: var(--ink);
      width: 960px;
      max-width: 100%;
      margin: 24px auto;
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      font-weight: 300;
      text-align: left;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      padding: 28px 32px;
      position: relative;
      box-sizing: border-box;
    }

    /* ── Section headings ── */
    #newfichaform .form-section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 28px 0 16px;
    }
    #newfichaform .form-section-head:first-child { margin-top: 0; }
    #newfichaform .form-section-head::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--oxide);
      flex-shrink: 0;
    }
    #newfichaform .form-section-head::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }
    #newfichaform .form-section-head span {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Basic rows ── */
    #newfichaform .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    #newfichaform .form-row-basic {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    #newfichaform .form-row-basic .form-field,
    #newfichaform .form-field {
      flex: 1;
      min-width: 150px;
      max-width: 280px;
      margin-bottom: 0;
    }

    #newfichaform .form-field label {
      display: block;
      margin-bottom: 6px;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--stone);
      text-transform: uppercase;
    }

    #newfichaform .form-field input.textbox,
    #newfichaform .form-field select.textbox {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 0.5px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      font-weight: 300;
      transition: border-color 0.15s;
    }

    #newfichaform .form-field input.textbox:focus,
    #newfichaform .form-field select.textbox:focus {
      outline: none;
      border-color: var(--plum3);
    }

    #newfichaform .form-field input.textbox::placeholder {
      color: var(--mist);
    }

    /* ── Selector grid (pending selection) ── */
    #newfichaform .selectors-column {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 3px;
      margin-bottom: 20px;
    }

    #newfichaform .selectors-column fieldset {
      box-sizing: border-box;
      text-align: center;
      padding: 12px 10px;
      border: 0.5px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      transition: background 0.15s;
      width: 100%;
    }

    #newfichaform .selectors-column fieldset:hover {
      background: var(--bg3);
    }

    /* ── Selector row (after selection) ── */
    #newfichaform .selectors-row {
      display: flex;
      gap: 3px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      min-height: 0;
      justify-content: flex-start;
      align-items: flex-start;
    }

    #newfichaform .selectors-row fieldset {
      flex: 0 0 auto;
      min-width: 160px;
      max-width: 260px;
      box-sizing: border-box;
      text-align: center;
      padding: 10px;
      border: 0.5px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      transition: background 0.15s;
    }

    #newfichaform .selectors-row fieldset:hover { background: var(--bg3); }

    /* ── Fieldset legends ── */
    #newfichaform fieldset legend {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 0 8px;
      margin-bottom: 10px;
      color: var(--plum2);
      text-transform: uppercase;
    }

    #newfichaform fieldset.listaSeason,
    #newfichaform fieldset.listaAldeas,
    #newfichaform fieldset.listaClanes,
    #newfichaform fieldset.listaElementos {
      text-align: center;
      position: relative;
      margin: 0 auto;
    }

    #newfichaform fieldset.listaClanes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 12px 8px;
    }

    #newfichaform fieldset.listaClanes.expanded {
      grid-template-columns: repeat(3, 1fr);
    }

    #newfichaform fieldset.listaClanes .clan-section-title,
    #newfichaform fieldset.listaClanes .clan-category,
    #newfichaform fieldset.listaClanes h3,
    #newfichaform fieldset.listaClanes h4 {
      grid-column: 1 / -1;
      text-align: left;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--plum2);
      margin: 8px 0 4px;
      padding: 0;
      display: block;
    }

    #newfichaform fieldset.listaClanes > div:not(label):not(.selected-item) {
      grid-column: 1 / -1;
      text-align: left;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--plum2);
      margin: 8px 0 4px;
      padding: 0;
      display: block;
    }

    #newfichaform fieldset.listaClanes.expanded > div:not(label):not(.selected-item),
    #newfichaform fieldset.listaClanes.expanded > p:not(label p),
    #newfichaform fieldset.listaClanes.expanded > span:not(label span) {
      grid-column: 1 / -1 !important;
      text-align: left !important;
      font-family: 'Cinzel', serif !important;
      font-size: 9px !important;
      font-weight: 700 !important;
      letter-spacing: 1.5px !important;
      text-transform: uppercase !important;
      color: var(--plum2) !important;
      margin: 8px 0 4px !important;
      padding: 0 !important;
      display: block !important;
    }

    #newfichaform fieldset.listaClanes.expanded .clan-section-title,
    #newfichaform fieldset.listaClanes.expanded .clan-category,
    #newfichaform fieldset.listaClanes.expanded h3,
    #newfichaform fieldset.listaClanes.expanded h4,
    #newfichaform fieldset.listaClanes.expanded > div:not(label):not(.selected-item) {
      display: block !important;
      grid-column: 1 / -1 !important;
    }

    #newfichaform fieldset.listaSeason legend,
    #newfichaform fieldset.listaAldeas legend,
    #newfichaform fieldset.listaClanes legend,
    #newfichaform fieldset.listaElementos legend {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      user-select: none;
      margin-bottom: 10px;
    }

    #newfichaform fieldset.listaClanes legend {
      grid-column: 1 / -1;
    }

    #newfichaform fieldset.listaSeason legend::after,
    #newfichaform fieldset.listaAldeas legend::after,
    #newfichaform fieldset.listaClanes legend::after,
    #newfichaform fieldset.listaElementos legend::after {
      content: '▼';
      font-size: 8px;
      transition: transform 0.3s ease;
      opacity: 0.6;
      margin-left: 4px;
      color: var(--oxide);
    }

    #newfichaform fieldset.listaSeason.expanded legend::after,
    #newfichaform fieldset.listaAldeas.expanded legend::after,
    #newfichaform fieldset.listaClanes.expanded legend::after,
    #newfichaform fieldset.listaElementos.expanded legend::after,
    #newfichaform fieldset.listaSeason:not(.collapsed) legend::after,
    #newfichaform fieldset.listaAldeas:not(.collapsed) legend::after,
    #newfichaform fieldset.listaClanes:not(.collapsed) legend::after,
    #newfichaform fieldset.listaElementos:not(.collapsed) legend::after {
      transform: rotate(180deg);
    }

    #newfichaform fieldset.listaClanes label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 6px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      min-height: 70px;
    }

    #newfichaform fieldset.listaSeason.collapsed label:not(.selected-item),
    #newfichaform fieldset.listaAldeas.collapsed label:not(.selected-item),
    #newfichaform fieldset.listaClanes.collapsed label:not(.selected-item),
    #newfichaform fieldset.listaElementos.collapsed label:not(.selected-item) {
      display: none;
    }

    #newfichaform fieldset.listaClanes.collapsed > div:not(.selected-item):not(label),
    #newfichaform fieldset.listaClanes.collapsed > p:not(label p),
    #newfichaform fieldset.listaClanes.collapsed > span:not(label span),
    #newfichaform fieldset.listaClanes.collapsed > h3,
    #newfichaform fieldset.listaClanes.collapsed > h4,
    #newfichaform fieldset.listaClanes.collapsed > .clan-section-title,
    #newfichaform fieldset.listaClanes.collapsed > .clan-category {
      display: none !important;
    }

    #newfichaform fieldset.listaClanes.expanded .clan-section-title,
    #newfichaform fieldset.listaClanes.expanded .clan-category,
    #newfichaform fieldset.listaClanes.expanded h3,
    #newfichaform fieldset.listaClanes.expanded h4 {
      display: block !important;
    }

    #newfichaform fieldset.listaSeason.collapsed,
    #newfichaform fieldset.listaAldeas.collapsed,
    #newfichaform fieldset.listaElementos.collapsed {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    #newfichaform fieldset.listaClanes.collapsed {
      grid-template-columns: 1fr;
      justify-items: center;
      margin: 0 auto;
    }

    #newfichaform fieldset.listaClanes.collapsed label.selected-item {
      flex-direction: column-reverse;
      align-items: center;
      justify-content: flex-end;
    }

    #newfichaform fieldset.listaClanes.collapsed label.selected-item input[type="radio"],
    #newfichaform fieldset.listaClanes.collapsed label.selected-item input[type="checkbox"] {
      order: 100;
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* collapsed label text */
    #newfichaform fieldset.listaClanes.collapsed label.selected-item p {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 0 0 6px 0 !important;
      color: var(--ink);
      display: block !important;
    }

    #newfichaform fieldset.listaClanes.collapsed label.selected-item img {
      margin: 0 auto !important;
      display: block !important;
    }

    /* ── Season / Aldeas / Elementos layout ── */
    #newfichaform fieldset.listaSeason,
    #newfichaform fieldset.listaAldeas,
    #newfichaform fieldset.listaElementos {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #newfichaform fieldset.listaSeason.expanded,
    #newfichaform fieldset.listaAldeas.expanded,
    #newfichaform fieldset.listaElementos.expanded {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    /* ── Selected item highlight (oxide accent) ── */
    #newfichaform fieldset.listaSeason label.selected-item,
    #newfichaform fieldset.listaAldeas label.selected-item,
    #newfichaform fieldset.listaClanes label.selected-item,
    #newfichaform fieldset.listaElementos label.selected-item {
      padding: 8px;
      background: rgba(122, 42, 16, 0.06);
      border: 0.5px solid var(--oxide);
      border-radius: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #newfichaform fieldset.listaClanes label.selected-item {
      order: -1;
      grid-column: 1 / -1;
      margin-bottom: 8px;
      width: 100%;
      max-width: 200px;
    }

    /* ── Label images ── */
    #newfichaform fieldset.listaClanes label img,
    #newfichaform fieldset:not(.listaClanes) label img {
      display: block;
      margin: 0 auto 4px;
      max-width: 50px;
      max-height: 50px;
      width: auto;
      height: auto;
      border-radius: 50%;
      border: 1.5px solid transparent;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    /* Selected image — oxide border only, no shadow */
    #newfichaform fieldset label input[type="radio"]:checked + img,
    #newfichaform fieldset label input[type="checkbox"]:checked + img {
      border-color: var(--oxide);
    }

    /* ── Label text ── */
    #newfichaform fieldset.listaClanes label p,
    #newfichaform fieldset:not(.listaClanes) label p {
      margin: 0;
      font-family: 'Cinzel', serif;
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--stone);
      line-height: 1.3;
      text-align: center;
      word-break: break-word;
      max-width: 100%;
    }

    /* ── Generic label ── */
    #newfichaform fieldset label {
      display: inline-block;
      margin: 3px;
      cursor: pointer;
      vertical-align: top;
      padding: 5px;
      transition: background 0.15s;
      position: relative;
    }

    #newfichaform fieldset.listaClanes label:hover,
    #newfichaform fieldset:not(.listaClanes) label:hover {
      background: rgba(90, 46, 154, 0.05);
    }

    #newfichaform fieldset label input[type="radio"],
    #newfichaform fieldset label input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    /* ── Select dropdowns inside fieldsets ── */
    #newfichaform fieldset select {
      width: 100%;
      padding: 6px 8px;
      border: 0.5px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }

    #newfichaform fieldset select:focus {
      outline: none;
      border-color: var(--plum3);
    }

    /* ── Textarea groups ── */
    #newfichaform .textarea-group {
      margin-bottom: 16px;
      text-align: left;
    }

    #newfichaform .textarea-group label {
      display: block;
      margin-bottom: 6px;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--stone);
      text-transform: uppercase;
    }

    #newfichaform textarea {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border);
      border-radius: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      font-weight: 300;
      text-align: justify;
      resize: vertical;
      transition: border-color 0.15s;
      box-sizing: border-box;
      line-height: 1.9;
    }

    #newfichaform textarea:focus {
      outline: none;
      border-color: var(--plum3);
    }

    #newfichaform textarea::placeholder {
      color: var(--mist);
      font-style: italic;
    }

    #newfichaform textarea.textarea-small {
      height: 60px;
      min-height: 60px;
    }

    #newfichaform textarea.textarea-large {
      height: 130px;
      min-height: 130px;
    }

    /* ── Submit button ── */
    #newfichaform input[type="submit"],
    #newfichaform #guardar_ficha {
      border: none;
      padding: 0 28px;
      height: 34px;
      border-radius: 0;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      background: var(--plum);
      margin: 28px 0 0 0;
      display: inline-block;
      cursor: pointer;
      transition: background 0.15s;
    }

    #newfichaform input[type="submit"]:hover,
    #newfichaform #guardar_ficha:hover {
      background: var(--plum2);
    }

  </style>
</head>

<body>
  {$header}
  <div class="fondo-blanco">
  <table border="0" cellspacing="{$theme['borderwidth']}" cellpadding="{$theme['tablespace']}" class="tborder">
    <tr>
      <td class="thead" colspan="1"><strong>Ficha Nueva</strong></td>
    </tr>
    <tr>
      <td class="trow1" valign="top">
        <div class="div_ficha">
          <form method="post" action="/sg/nueva_ficha.php" name="newficha" id="newfichaform">

            <div class="form-section-head"><span>Datos Básicos</span></div>
            <div class="form-row-basic">
              <div class="form-field">
                <label>Nombre*</label>
                <input class="textbox" type="text" name="name" required="">
              </div>
              <div class="form-field">
                <label>Apodo</label>
                <input class="textbox" type="text" name="alias">
              </div>
              <div class="form-field">
                <label>Edad*</label>
                <input class="textbox" type="number" name="age" min="12" max="90" required="">
              </div>
              <div class="form-field">
                <label>Altura (cm)*</label>
                <input class="textbox" type="number" name="altura" min="100" max="250" required="">
              </div>
              <div class="form-field">
                <label>Peso (kg)*</label>
                <input class="textbox" type="number" name="peso" min="30" max="300" required="">
              </div>
              <div class="form-field">
                <label>Sexo*</label>
                <select name="sexo" class="textbox" required>
                  <option value="hombre" selected>Hombre</option>
                  <option value="mujer">Mujer</option>
                </select>
              </div>
            </div>

            <div class="form-section-head"><span>Origen &amp; Afiliación</span></div>
            <div class="selectors-row" id="selectors-row"></div>
            <div class="selectors-column" id="selectors-column">
              <fieldset class="listaSeason" data-selector="season" required="">
                <legend>Cumpleaños (Estación)</legend>
                <label>
                  <input type="radio" name="season" value="1" required="">
                  <img src="https://onepiecegaiden.com/images/op/ficha/InviernoCumple_One_Piece_Gaiden_Foro_Rol.png">
                  <p>Invierno</p>
                </label>
                <label>
                  <input type="radio" name="season" value="2" required="">
                  <img src="https://onepiecegaiden.com/images/op/ficha/PrimaveraCumple_One_Piece_Gaiden_Foro_Rol.png">
                  <p>Primavera</p>
                </label>
                <label>
                  <input type="radio" name="season" value="3" required="">
                  <img src="https://onepiecegaiden.com/images/op/ficha/VeranoCumple_One_Piece_Gaiden_Foro_Rol.png">
                  <p>Verano</p>
                </label>
                <label>
                  <input type="radio" name="season" value="4" required="">
                  <img src="https://onepiecegaiden.com/images/op/ficha/OtonoCumple_One_Piece_Gaiden_Foro_Rol.png">
                  <p>Otoño</p>
                </label>
              </fieldset>
              <fieldset class="listaAldeas" data-selector="aldea" required="">
                <legend>Aldea</legend>
              </fieldset>
              <fieldset class="listaClanes" data-selector="clan" required="">
                <legend>Clan</legend>
              </fieldset>
              <fieldset class="listaElementos" data-selector="elementos" required="">
                <legend>Elementos</legend>
              </fieldset>
            </div>
            <div class="form-section-head"><span>Descripción</span></div>
            <div class="textarea-group">
              <label>Apariencia (mínimo 400 carácteres)</label>
              <textarea name="phi" class="textarea-large" minlength="400" required=""></textarea>
            </div>
            <div class="textarea-group">
              <label>Personalidad (mínimo 400 carácteres)</label>
              <textarea name="psi" class="textarea-large" minlength="400" required=""></textarea>
            </div>
            <div class="textarea-group">
              <label>Virtudes</label>
              <textarea name="virtudes" class="textarea-large"></textarea>
            </div>
            <div class="textarea-group">
              <label>Defectos</label>
              <textarea name="defectos" class="textarea-large"></textarea>
            </div>

            <div class="form-section-head"><span>Historia</span></div>
            <div class="textarea-group">
              <label>Biografía (mínimo 800 carácteres)</label>
              <textarea name="history" class="textarea-large" minlength="800" required=""></textarea>
            </div>
            <div class="textarea-group">
              <label>Información Extra (opcional)</label>
              <textarea name="extra" class="textarea-large" placeholder="- Le gusta comer ramen."></textarea>
            </div>

            <div class="form-section-head"><span>Registro</span></div>
            <div class="textarea-group">
              <label>Frase que representa al personaje (opcional)</label>
              <textarea name="frase" class="textarea-small" placeholder="Un verdadero héroe siempre llega tarde."></textarea>
            </div>
            <div class="textarea-group">
              <label>Origen del físico del personaje (obligatorio)</label>
              <textarea name="fisico_de_pj" class="textarea-small" required="" placeholder="Nombre del Físico — Serie / Juego de donde proviene"></textarea>
            </div>
            <div class="textarea-group">
              <label>¿Cómo conociste Shinobi Gaiden? (obligatorio)</label>
              <textarea name="como_nos_conociste" class="textarea-small" placeholder="Google, afiliado, red social, otro usuario, etc..." required=""></textarea>
            </div>

            <div style="display: none">
              <input type="text" value="false" id="comp" name="submit">
              <input type="text" id="userid" name="uid" value="{$mybb->user['uid']}">
              <input type="text" name="fichaurl" value="./ficha.php?action=profile&amp;uid={$mybb->user['uid']}">
            </div>
            <input id="guardar_ficha" class="button" type="submit" onclick="javascript: document.getElementById('comp').value = 'true';" value="Guardar">
          </form>
        </div>
        <br />
      </td>
    </tr>
  </table>
	</div>
  {$footer}
  {$nueva_ficha_script}
  <script>
    (function() {
      const selectorsColumn = document.getElementById('selectors-column');
      const selectorsRow = document.getElementById('selectors-row');
      
      function moveSelectorToRow(fieldset) {
        if (fieldset && fieldset.parentNode === selectorsColumn) {
          fieldset.classList.add('selected');
          selectorsRow.appendChild(fieldset);
        }
      }
      
      function checkSelector(fieldset) {
        if (!fieldset) return;
        
        const inputs = fieldset.querySelectorAll('input[type="radio"], input[type="checkbox"]');
        const selects = fieldset.querySelectorAll('select');
        let hasSelection = false;
        
        inputs.forEach(input => {
          if (input.checked) {
            hasSelection = true;
          }
        });
        
        selects.forEach(select => {
          if (select.value && select.value !== '' && select.value !== '0') {
            hasSelection = true;
          }
        });
        
        if (hasSelection && fieldset.parentNode === selectorsColumn) {
          moveSelectorToRow(fieldset);
        }
      }
      
      function attachListeners(fieldset) {
        if (!fieldset) return;
        
        const inputs = fieldset.querySelectorAll('input[type="radio"], input[type="checkbox"]');
        const selects = fieldset.querySelectorAll('select');
        
        inputs.forEach(input => {
          input.addEventListener('change', function() {
            checkSelector(fieldset);
          });
        });
        
        selects.forEach(select => {
          select.addEventListener('change', function() {
            checkSelector(fieldset);
          });
        });
      }
      
      function initializeSelectors() {
        if (!selectorsColumn) return;
        
        const fieldsets = selectorsColumn.querySelectorAll('fieldset');
        fieldsets.forEach(fieldset => {
          attachListeners(fieldset);
          checkSelector(fieldset);
        });
        
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
              if (node.nodeType === 1) {
                const newInputs = node.querySelectorAll ? node.querySelectorAll('input[type="radio"], input[type="checkbox"], select') : [];
                const fieldset = node.closest ? node.closest('fieldset') : null;
                if (fieldset && fieldset.parentNode === selectorsColumn) {
                  attachListeners(fieldset);
                  checkSelector(fieldset);
                }
              }
            });
          });
        });
        
        observer.observe(selectorsColumn, {
          childList: true,
          subtree: true
        });
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeSelectors);
      } else {
        setTimeout(initializeSelectors, 100);
      }

      // Funcionalidad de colapso para todos los selectores
      function initSelectorCollapse() {
        const form = document.getElementById('newfichaform');
        if (!form) return;
        
        const selectorFieldsets = [
          'fieldset.listaSeason',
          'fieldset.listaAldeas',
          'fieldset.listaClanes',
          'fieldset.listaElementos'
        ];

        function findFieldsets() {
          return selectorFieldsets.map(selector => {
            return form.querySelector(selector) || document.querySelector(selector);
          }).filter(fieldset => fieldset !== null);
        }

        let fieldsets = findFieldsets();
        if (fieldsets.length === 0) {
          setTimeout(initSelectorCollapse, 500);
          return;
        }

        function initFieldsetCollapse(fieldset) {
          if (!fieldset) return;

          let isManuallyExpanded = false;

          function updateDisplay(forceCollapse = false) {
            // Solo actualizar este fieldset específico
            const selectedInput = fieldset.querySelector('input[type="radio"]:checked, input[type="checkbox"]:checked');
            const selectedSelect = fieldset.querySelector('select');
            const allLabels = fieldset.querySelectorAll('label');
            
            let hasSelection = false;
            let selectedLabel = null;

            if (selectedInput) {
              hasSelection = true;
              selectedLabel = selectedInput.closest('label');
            } else if (selectedSelect && selectedSelect.value && selectedSelect.value !== '' && selectedSelect.value !== '0') {
              hasSelection = true;
            }
            
            // Actualizar solo las clases de este fieldset
            if (hasSelection && selectedLabel) {
              allLabels.forEach(label => {
                label.classList.remove('selected-item');
                if (label === selectedLabel) {
                  label.classList.add('selected-item');
                }
              });
              // Colapsar si hay selección y no está expandido manualmente (o si se fuerza)
              if (forceCollapse || !isManuallyExpanded) {
                fieldset.classList.add('collapsed');
                fieldset.classList.remove('expanded');
                isManuallyExpanded = false;
                
                // Ocultar elementos adicionales en el fieldset de clanes (excepto el label seleccionado)
                if (fieldset.classList.contains('listaClanes') && selectedLabel) {
                  // Reorganizar elementos dentro del label: texto primero, imagen después
                  const img = selectedLabel.querySelector('img');
                  const p = selectedLabel.querySelector('p');
                  const input = selectedLabel.querySelector('input[type="radio"], input[type="checkbox"]');
                  
                  if (img && p && selectedLabel.contains(img) && selectedLabel.contains(p)) {
                    // Verificar el orden actual y reorganizar si es necesario
                    const children = Array.from(selectedLabel.childNodes).filter(node => 
                      node.nodeType === 1 && (node === img || node === p || node === input)
                    );
                    
                    // Si la imagen está antes del texto, reorganizar
                    const imgIndex = children.indexOf(img);
                    const pIndex = children.indexOf(p);
                    
                    if (imgIndex < pIndex) {
                      // La imagen está antes del texto, mover el texto antes de la imagen
                      selectedLabel.insertBefore(p, img);
                    }
                  }
                  
                  // Ocultar todos los elementos excepto el label seleccionado y el legend
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      if (el.tagName === 'LABEL' && !el.classList.contains('selected-item')) {
                        el.style.display = 'none';
                      } else if (el.tagName !== 'LABEL') {
                        // Ocultar divs, p, span, etc. que no sean el label seleccionado
                        el.style.display = 'none';
                      }
                    }
                  });
                }
              }
            } else {
              allLabels.forEach(label => {
                label.classList.remove('selected-item');
              });
              if (!hasSelection) {
                fieldset.classList.remove('collapsed');
                fieldset.classList.add('expanded');
                isManuallyExpanded = false;
                
                // Mostrar elementos adicionales cuando se expande
                if (fieldset.classList.contains('listaClanes')) {
                  // Mostrar todos los elementos hijos
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      const textContent = el.textContent || '';
                      // Si contiene texto de títulos, mostrarlo
                      if (textContent.includes('Clanes Exclusivos') || 
                          // textContent.includes('Otros Clanes') ||
                          el.classList.contains('clan-section-title') || 
                          el.classList.contains('clan-category') || 
                          el.tagName === 'H3' || 
                          el.tagName === 'H4' ||
                          (el.tagName === 'DIV' && !el.classList.contains('selected-item') && (el.textContent.includes('Clanes Exclusivos') || 
									   // el.textContent.includes('Otros Clanes')
																							  ))) {
                        el.style.display = 'block';
                      } else if (el.tagName === 'LABEL') {
                        el.style.display = '';
                      } else if (el.tagName !== 'LABEL' && !el.classList.contains('selected-item')) {
                        // Mostrar otros elementos que no sean labels
                        el.style.display = '';
                      }
                    }
                  });
                }
              }
            }
          }

          // Hacer clic en el legend para expandir/colapsar
          const legend = fieldset.querySelector('legend');
          if (legend) {
            legend.style.cursor = 'pointer';
            legend.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              if (fieldset.classList.contains('collapsed')) {
                // Expandir manualmente
                fieldset.classList.remove('collapsed');
                fieldset.classList.add('expanded');
                isManuallyExpanded = true;
                
                // Mostrar elementos adicionales cuando se expande manualmente
                if (fieldset.classList.contains('listaClanes')) {
                  // Mostrar todos los elementos hijos
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      const textContent = el.textContent || '';
                      // Si contiene texto de títulos, mostrarlo
                      if (textContent.includes('Clanes Exclusivos') || 
                          // textContent.includes('Otros Clanes') ||
                          el.classList.contains('clan-section-title') || 
                          el.classList.contains('clan-category') || 
                          el.tagName === 'H3' || 
                          el.tagName === 'H4' ||
                          (el.tagName === 'DIV' && !el.classList.contains('selected-item') && (el.textContent.includes('Clanes Exclusivos') 
												// || el.textContent.includes('Otros Clanes')
))) {
                        el.style.display = 'block';
                      } else if (el.tagName === 'LABEL') {
                        el.style.display = '';
                      } else if (el.tagName !== 'LABEL' && !el.classList.contains('selected-item')) {
                        // Mostrar otros elementos que no sean labels
                        el.style.display = '';
                      }
                    }
                  });
                }
              } else if (fieldset.classList.contains('expanded')) {
                // Si está expandido, colapsar si hay selección
                const hasSelection = fieldset.querySelector('input[type="radio"]:checked, input[type="checkbox"]:checked, select[value]:not([value=""])');
                if (hasSelection) {
                  updateDisplay(true);
                } else {
                  fieldset.classList.remove('expanded');
                  fieldset.classList.add('collapsed');
                  isManuallyExpanded = false;
                }
              } else {
                updateDisplay(true);
              }
            });
          }

          // Hacer clic en el item seleccionado para expandir (solo si está colapsado)
          fieldset.addEventListener('click', function(e) {
            const clickedLabel = e.target.closest('label');
            if (clickedLabel && clickedLabel.classList.contains('selected-item') && fieldset.classList.contains('collapsed')) {
              // Solo expandir si está colapsado, no interferir con la selección
              if (e.target.tagName !== 'INPUT') {
                e.preventDefault();
                fieldset.classList.remove('collapsed');
                fieldset.classList.add('expanded');
                isManuallyExpanded = true;
                
                // Mostrar elementos adicionales cuando se expande manualmente
                if (fieldset.classList.contains('listaClanes')) {
                  // Mostrar todos los elementos hijos
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      const textContent = el.textContent || '';
                      // Si contiene texto de títulos, mostrarlo
                      if (textContent.includes('Clanes Exclusivos') || 
                          // textContent.includes('Otros Clanes') ||
                          el.classList.contains('clan-section-title') || 
                          el.classList.contains('clan-category') || 
                          el.tagName === 'H3' || 
                          el.tagName === 'H4' ||
                          (el.tagName === 'DIV' && !el.classList.contains('selected-item') && (el.textContent.includes('Clanes Exclusivos') 
																							   // || el.textContent.includes('Otros Clanes')
																							  ))) {
                        el.style.display = 'block';
                      } else if (el.tagName === 'LABEL') {
                        el.style.display = '';
                      } else if (el.tagName !== 'LABEL' && !el.classList.contains('selected-item')) {
                        // Mostrar otros elementos que no sean labels
                        el.style.display = '';
                      }
                    }
                  });
                }
              }
            }
          });

          // Usar delegación de eventos para inputs que se agreguen dinámicamente
          fieldset.addEventListener('change', function(e) {
            if (e.target.matches('input[type="radio"], input[type="checkbox"], select')) {
              // Cuando se selecciona un nuevo item, forzar colapso
              setTimeout(() => updateDisplay(true), 50);
            }
          });

          // Observer para detectar cuando se agregan elementos dinámicamente
          const observer = new MutationObserver(function(mutations) {
            let shouldUpdate = false;
            mutations.forEach(function(mutation) {
              if (mutation.addedNodes.length > 0) {
                shouldUpdate = true;
              }
            });
            if (shouldUpdate) {
              setTimeout(updateDisplay, 100);
            }
          });

          observer.observe(fieldset, {
            childList: true,
            subtree: true
          });

          // Inicializar estado
          setTimeout(updateDisplay, 500);
          setTimeout(updateDisplay, 1500);
        }

        // Inicializar cada fieldset
        fieldsets.forEach(fieldset => {
          initFieldsetCollapse(fieldset);
        });
      }

      // Intentar inicializar múltiples veces para asegurar que funcione
      function tryInitSelectorCollapse() {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initSelectorCollapse, 300);
            setTimeout(initSelectorCollapse, 1000);
            setTimeout(initSelectorCollapse, 2000);
          });
        } else {
          setTimeout(initSelectorCollapse, 300);
          setTimeout(initSelectorCollapse, 1000);
          setTimeout(initSelectorCollapse, 2000);
          setTimeout(initSelectorCollapse, 3000);
        }
      }

      tryInitSelectorCollapse();

      // También escuchar eventos personalizados si se usan para cargar selectores
      document.addEventListener('selectorsLoaded', function() {
        setTimeout(initSelectorCollapse, 100);
      });

      // Observer global para detectar cuando se agregan fieldsets
      const globalObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeType === 1) {
              if (node.matches && (node.matches('fieldset.listaSeason') || 
                                   node.matches('fieldset.listaAldeas') || 
                                   node.matches('fieldset.listaClanes') || 
                                   node.matches('fieldset.listaElementos'))) {
                setTimeout(initSelectorCollapse, 200);
              }
              if (node.querySelector && node.querySelector('fieldset.listaSeason, fieldset.listaAldeas, fieldset.listaClanes, fieldset.listaElementos')) {
                setTimeout(initSelectorCollapse, 200);
              }
            }
          });
        });
      });

      globalObserver.observe(document.body, {
        childList: true,
        subtree: true
      });
    })();
  </script>
</body>
