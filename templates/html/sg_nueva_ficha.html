<head>

  {$headerinclude}
  <style>
    #newfichaform {
      color: white;
      width: 992px;
      margin: 0 auto;
      font-size: 13px;

    #newfichaform .form-row-basic {

      gap: 15px;

    #newfichaform .form-row-basic .form-field {
      flex: 1;

    }

    #newfichaform .form-field {

    }

    #newfichaform .form-field label {

      margin-bottom: 6px;

      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    #newfichaform .form-field input.textbox {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    #newfichaform .form-field input.textbox:focus {
      outline: none;
      border-color: #ff6b35;
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 0 2px rgba(255, 107, 53, 0.2);
    }

    #newfichaform .form-field input.textbox::placeholder {

    }

    #newfichaform .selectors-column {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-bottom: 15px;
      justify-items: center;
    }

    #newfichaform .selectors-column fieldset {
      box-sizing: border-box;
      text-align: center;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.03);
      transition: all 0.2s ease;
      width: 100%;
      max-width: 300px;
    }

    #newfichaform .selectors-column fieldset:hover {

      border-color: rgba(255,255,255,0.25);
    }

    #newfichaform .selectors-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      min-height: 50px;
      justify-content: center;
      align-items: center;
    }

    #newfichaform .selectors-row fieldset {
      flex: 0 0 auto;
      min-width: 180px;
      max-width: 300px;
      box-sizing: border-box;
      text-align: center;
      transition: all 0.3s ease;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
    }

    #newfichaform fieldset legend {
      font-size: 12px;
      padding: 0 8px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    #newfichaform fieldset.listaSeason,
    #newfichaform fieldset.listaAldeas,
    #newfichaform fieldset.listaClanes,
    #newfichaform fieldset.listaElementos {
      text-align: center;
      position: relative;
      margin: 0 auto;
    }

    #newfichaform fieldset.listaClanes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 8px;
    }

    #newfichaform fieldset.listaClanes.expanded {
      grid-template-columns: repeat(3, 1fr);
    }

    #newfichaform fieldset.listaClanes .clan-section-title,
    #newfichaform fieldset.listaClanes .clan-category,
    #newfichaform fieldset.listaClanes h3,
    #newfichaform fieldset.listaClanes h4 {
      grid-column: 1 / -1;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin: 10px 0 5px;
      padding: 0;
      display: block;
    }

    #newfichaform fieldset.listaClanes > div:not(label):not(.selected-item) {
      grid-column: 1 / -1;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin: 10px 0 5px;
      padding: 0;
      display: block;
    }

    /* Estilo para elementos que contienen títulos de sección - más específico */
    #newfichaform fieldset.listaClanes.expanded > div:not(label):not(.selected-item),
    #newfichaform fieldset.listaClanes.expanded > p:not(label p),
    #newfichaform fieldset.listaClanes.expanded > span:not(label span) {
      grid-column: 1 / -1 !important;
      text-align: left !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      color: rgba(255,255,255,0.9) !important;
      margin: 10px 0 5px !important;
      padding: 0 !important;
      display: block !important;
    }

    #newfichaform fieldset.listaClanes.expanded .clan-section-title,
    #newfichaform fieldset.listaClanes.expanded .clan-category,
    #newfichaform fieldset.listaClanes.expanded h3,
    #newfichaform fieldset.listaClanes.expanded h4,
    #newfichaform fieldset.listaClanes.expanded > div:not(label):not(.selected-item) {
      display: block !important;
      grid-column: 1 / -1 !important;
    }

    #newfichaform fieldset.listaSeason legend,
    #newfichaform fieldset.listaAldeas legend,
    #newfichaform fieldset.listaClanes legend,
    #newfichaform fieldset.listaElementos legend {
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      user-select: none;
      margin-bottom: 8px;
    }

    #newfichaform fieldset.listaClanes legend {
      grid-column: 1 / -1;
    }

    #newfichaform fieldset.listaSeason legend::after,
    #newfichaform fieldset.listaAldeas legend::after,
    #newfichaform fieldset.listaClanes legend::after,
    #newfichaform fieldset.listaElementos legend::after {
      content: '▼';
      font-size: 10px;
      transition: transform 0.3s ease;
      opacity: 0.7;
      margin-left: 5px;
    }

    #newfichaform fieldset.listaSeason.expanded legend::after,
    #newfichaform fieldset.listaAldeas.expanded legend::after,
    #newfichaform fieldset.listaClanes.expanded legend::after,
    #newfichaform fieldset.listaElementos.expanded legend::after,
    #newfichaform fieldset.listaSeason:not(.collapsed) legend::after,
    #newfichaform fieldset.listaAldeas:not(.collapsed) legend::after,
    #newfichaform fieldset.listaClanes:not(.collapsed) legend::after,
    #newfichaform fieldset.listaElementos:not(.collapsed) legend::after {
      transform: rotate(180deg);
    }

    #newfichaform fieldset.listaClanes label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 5px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      position: relative;
      min-height: 70px;
    }

    #newfichaform fieldset.listaSeason.collapsed label:not(.selected-item),
    #newfichaform fieldset.listaAldeas.collapsed label:not(.selected-item),
    #newfichaform fieldset.listaClanes.collapsed label:not(.selected-item),
    #newfichaform fieldset.listaElementos.collapsed label:not(.selected-item) {
      display: none;
    }

    #newfichaform fieldset.listaClanes.collapsed > div:not(.selected-item):not(label),
    #newfichaform fieldset.listaClanes.collapsed > p:not(label p),
    #newfichaform fieldset.listaClanes.collapsed > span:not(label span),
    #newfichaform fieldset.listaClanes.collapsed > h3,
    #newfichaform fieldset.listaClanes.collapsed > h4,
    #newfichaform fieldset.listaClanes.collapsed > .clan-section-title,
    #newfichaform fieldset.listaClanes.collapsed > .clan-category {
      display: none !important;
    }

    #newfichaform fieldset.listaClanes.expanded .clan-section-title,
    #newfichaform fieldset.listaClanes.expanded .clan-category,
    #newfichaform fieldset.listaClanes.expanded h3,
    #newfichaform fieldset.listaClanes.expanded h4 {
      display: block !important;
    }

    #newfichaform fieldset.listaSeason.collapsed,
    #newfichaform fieldset.listaAldeas.collapsed,
    #newfichaform fieldset.listaElementos.collapsed {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    #newfichaform fieldset.listaClanes.collapsed {
      grid-template-columns: 1fr;
      justify-items: center;
      margin: 0 auto;
    }

    #newfichaform fieldset.listaClanes.collapsed label.selected-item {
      flex-direction: column-reverse;
      align-items: center;
      justify-content: flex-end;
    }

    #newfichaform fieldset.listaClanes.collapsed label.selected-item input[type="radio"],
    #newfichaform fieldset.listaClanes.collapsed label.selected-item input[type="checkbox"] {
      order: 100;
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* Con column-reverse, el orden visual se invierte */
    /* Si el HTML es: input, img, p -> visualmente se ve: p, img (que es lo que queremos) */
    #newfichaform fieldset.listaClanes.collapsed label.selected-item p {
      font-size: 12px;
      font-weight: 600;
      margin: 0 0 8px 0 !important;
      color: rgba(255,255,255,0.9);
      display: block !important;
    }

    #newfichaform fieldset.listaClanes.collapsed label.selected-item img {
      margin: 0 auto !important;
      margin-top: 0 !important;
      margin-bottom: 0 !important;
      display: block !important;
    }

    #newfichaform fieldset.listaSeason,
    #newfichaform fieldset.listaAldeas,
    #newfichaform fieldset.listaElementos {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #newfichaform fieldset.listaSeason.expanded,
    #newfichaform fieldset.listaAldeas.expanded,
    #newfichaform fieldset.listaElementos.expanded {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    #newfichaform fieldset.listaSeason label.selected-item,

      align-items: center;

    }

    #newfichaform fieldset label {
      display: inline-block;
      margin: 3px;
      cursor: pointer;
      vertical-align: top;
      padding: 5px;
      border-radius: 4px;
      transition: all 0.2s ease;
      position: relative;
    }

    #newfichaform fieldset:not(.listaClanes) label:hover {
      background: rgba(255,255,255,0.1);
    }

    #newfichaform fieldset label input[type="radio"],
    #newfichaform fieldset label input[type="checkbox"] {

      width: 0;
      height: 0;

    }

    #newfichaform fieldset:not(.listaClanes) label img {
      display: block;
      margin: 0 auto 4px;
      max-width: 50px;
      max-height: 50px;
      width: auto;
      height: auto;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }

    #newfichaform fieldset:not(.listaClanes) label p {
      margin: 0;
      font-size: 10px;

      line-height: 1.2;
    }

    #newfichaform fieldset select {

      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);

      font-size: 12px;

    #newfichaform fieldset select:focus {

    }

    #newfichaform .textarea-group {

  </style>
</head>

  <script>
    (function() {
      const selectorsColumn = document.getElementById('selectors-column');
      const selectorsRow = document.getElementById('selectors-row');
      
      function moveSelectorToRow(fieldset) {
        if (fieldset && fieldset.parentNode === selectorsColumn) {
          fieldset.classList.add('selected');
          selectorsRow.appendChild(fieldset);
        }
      }
      
      function checkSelector(fieldset) {
        if (!fieldset) return;
        
        const inputs = fieldset.querySelectorAll('input[type="radio"], input[type="checkbox"]');
        const selects = fieldset.querySelectorAll('select');
        let hasSelection = false;
        
        inputs.forEach(input => {
          if (input.checked) {
            hasSelection = true;
          }
        });
        
        selects.forEach(select => {
          if (select.value && select.value !== '' && select.value !== '0') {
            hasSelection = true;
          }
        });
        
        if (hasSelection && fieldset.parentNode === selectorsColumn) {
          moveSelectorToRow(fieldset);
        }
      }
      
      function attachListeners(fieldset) {
        if (!fieldset) return;
        
        const inputs = fieldset.querySelectorAll('input[type="radio"], input[type="checkbox"]');
        const selects = fieldset.querySelectorAll('select');
        
        inputs.forEach(input => {
          input.addEventListener('change', function() {
            checkSelector(fieldset);
          });
        });
        
        selects.forEach(select => {
          select.addEventListener('change', function() {
            checkSelector(fieldset);
          });
        });
      }
      
      function initializeSelectors() {
        if (!selectorsColumn) return;
        
        const fieldsets = selectorsColumn.querySelectorAll('fieldset');
        fieldsets.forEach(fieldset => {
          attachListeners(fieldset);
          checkSelector(fieldset);
        });
        
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
              if (node.nodeType === 1) {
                const newInputs = node.querySelectorAll ? node.querySelectorAll('input[type="radio"], input[type="checkbox"], select') : [];
                const fieldset = node.closest ? node.closest('fieldset') : null;
                if (fieldset && fieldset.parentNode === selectorsColumn) {
                  attachListeners(fieldset);
                  checkSelector(fieldset);
                }
              }
            });
          });
        });
        
        observer.observe(selectorsColumn, {
          childList: true,
          subtree: true
        });
      }
      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeSelectors);
      } else {
        setTimeout(initializeSelectors, 100);
      }

      // Funcionalidad de colapso para todos los selectores
      function initSelectorCollapse() {
        const form = document.getElementById('newfichaform');
        if (!form) return;
        
        const selectorFieldsets = [
          'fieldset.listaSeason',
          'fieldset.listaAldeas',
          'fieldset.listaClanes',
          'fieldset.listaElementos'
        ];

        function findFieldsets() {
          return selectorFieldsets.map(selector => {
            return form.querySelector(selector) || document.querySelector(selector);
          }).filter(fieldset => fieldset !== null);
        }

        let fieldsets = findFieldsets();
        if (fieldsets.length === 0) {
          setTimeout(initSelectorCollapse, 500);
          return;
        }

        function initFieldsetCollapse(fieldset) {
          if (!fieldset) return;

          let isManuallyExpanded = false;

          function updateDisplay(forceCollapse = false) {
            // Solo actualizar este fieldset específico
            const selectedInput = fieldset.querySelector('input[type="radio"]:checked, input[type="checkbox"]:checked');
            const selectedSelect = fieldset.querySelector('select');
            const allLabels = fieldset.querySelectorAll('label');
            
            let hasSelection = false;
            let selectedLabel = null;

            if (selectedInput) {
              hasSelection = true;
              selectedLabel = selectedInput.closest('label');
            } else if (selectedSelect && selectedSelect.value && selectedSelect.value !== '' && selectedSelect.value !== '0') {
              hasSelection = true;
            }
            
            // Actualizar solo las clases de este fieldset
            if (hasSelection && selectedLabel) {
              allLabels.forEach(label => {
                label.classList.remove('selected-item');
                if (label === selectedLabel) {
                  label.classList.add('selected-item');
                }
              });
              // Colapsar si hay selección y no está expandido manualmente (o si se fuerza)
              if (forceCollapse || !isManuallyExpanded) {
                fieldset.classList.add('collapsed');
                fieldset.classList.remove('expanded');
                isManuallyExpanded = false;
                
                // Ocultar elementos adicionales en el fieldset de clanes (excepto el label seleccionado)
                if (fieldset.classList.contains('listaClanes') && selectedLabel) {
                  // Reorganizar elementos dentro del label: texto primero, imagen después
                  const img = selectedLabel.querySelector('img');
                  const p = selectedLabel.querySelector('p');
                  const input = selectedLabel.querySelector('input[type="radio"], input[type="checkbox"]');
                  
                  if (img && p && selectedLabel.contains(img) && selectedLabel.contains(p)) {
                    // Verificar el orden actual y reorganizar si es necesario
                    const children = Array.from(selectedLabel.childNodes).filter(node => 
                      node.nodeType === 1 && (node === img || node === p || node === input)
                    );
                    
                    // Si la imagen está antes del texto, reorganizar
                    const imgIndex = children.indexOf(img);
                    const pIndex = children.indexOf(p);
                    
                    if (imgIndex < pIndex) {
                      // La imagen está antes del texto, mover el texto antes de la imagen
                      selectedLabel.insertBefore(p, img);
                    }
                  }
                  
                  // Ocultar todos los elementos excepto el label seleccionado y el legend
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      if (el.tagName === 'LABEL' && !el.classList.contains('selected-item')) {
                        el.style.display = 'none';
                      } else if (el.tagName !== 'LABEL') {
                        // Ocultar divs, p, span, etc. que no sean el label seleccionado
                        el.style.display = 'none';
                      }
                    }
                  });
                }
              }
            } else {
              allLabels.forEach(label => {
                label.classList.remove('selected-item');
              });
              if (!hasSelection) {
                fieldset.classList.remove('collapsed');
                fieldset.classList.add('expanded');
                isManuallyExpanded = false;
                
                // Mostrar elementos adicionales cuando se expande
                if (fieldset.classList.contains('listaClanes')) {
                  // Mostrar todos los elementos hijos
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      const textContent = el.textContent || '';
                      // Si contiene texto de títulos, mostrarlo
                      if (textContent.includes('Clanes Exclusivos') || 
                          // textContent.includes('Otros Clanes') ||
                          el.classList.contains('clan-section-title') || 
                          el.classList.contains('clan-category') || 
                          el.tagName === 'H3' || 
                          el.tagName === 'H4' ||
                          (el.tagName === 'DIV' && !el.classList.contains('selected-item') && (el.textContent.includes('Clanes Exclusivos') || 
									   // el.textContent.includes('Otros Clanes')
																							  ))) {
                        el.style.display = 'block';
                      } else if (el.tagName === 'LABEL') {
                        el.style.display = '';
                      } else if (el.tagName !== 'LABEL' && !el.classList.contains('selected-item')) {
                        // Mostrar otros elementos que no sean labels
                        el.style.display = '';
                      }
                    }
                  });
                }
              }
            }
          }

          // Hacer clic en el legend para expandir/colapsar
          const legend = fieldset.querySelector('legend');
          if (legend) {
            legend.style.cursor = 'pointer';
            legend.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              if (fieldset.classList.contains('collapsed')) {
                // Expandir manualmente
                fieldset.classList.remove('collapsed');
                fieldset.classList.add('expanded');
                isManuallyExpanded = true;
                
                // Mostrar elementos adicionales cuando se expande manualmente
                if (fieldset.classList.contains('listaClanes')) {
                  // Mostrar todos los elementos hijos
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      const textContent = el.textContent || '';
                      // Si contiene texto de títulos, mostrarlo
                      if (textContent.includes('Clanes Exclusivos') || 
                          // textContent.includes('Otros Clanes') ||
                          el.classList.contains('clan-section-title') || 
                          el.classList.contains('clan-category') || 
                          el.tagName === 'H3' || 
                          el.tagName === 'H4' ||
                          (el.tagName === 'DIV' && !el.classList.contains('selected-item') && (el.textContent.includes('Clanes Exclusivos') 
												// || el.textContent.includes('Otros Clanes')
))) {
                        el.style.display = 'block';
                      } else if (el.tagName === 'LABEL') {
                        el.style.display = '';
                      } else if (el.tagName !== 'LABEL' && !el.classList.contains('selected-item')) {
                        // Mostrar otros elementos que no sean labels
                        el.style.display = '';
                      }
                    }
                  });
                }
              } else if (fieldset.classList.contains('expanded')) {
                // Si está expandido, colapsar si hay selección
                const hasSelection = fieldset.querySelector('input[type="radio"]:checked, input[type="checkbox"]:checked, select[value]:not([value=""])');
                if (hasSelection) {
                  updateDisplay(true);
                } else {
                  fieldset.classList.remove('expanded');
                  fieldset.classList.add('collapsed');
                  isManuallyExpanded = false;
                }
              } else {
                updateDisplay(true);
              }
            });
          }

          // Hacer clic en el item seleccionado para expandir (solo si está colapsado)
          fieldset.addEventListener('click', function(e) {
            const clickedLabel = e.target.closest('label');
            if (clickedLabel && clickedLabel.classList.contains('selected-item') && fieldset.classList.contains('collapsed')) {
              // Solo expandir si está colapsado, no interferir con la selección
              if (e.target.tagName !== 'INPUT') {
                e.preventDefault();
                fieldset.classList.remove('collapsed');
                fieldset.classList.add('expanded');
                isManuallyExpanded = true;
                
                // Mostrar elementos adicionales cuando se expande manualmente
                if (fieldset.classList.contains('listaClanes')) {
                  // Mostrar todos los elementos hijos
                  const allChildren = Array.from(fieldset.children);
                  allChildren.forEach(el => {
                    if (el.tagName !== 'LEGEND') {
                      const textContent = el.textContent || '';
                      // Si contiene texto de títulos, mostrarlo
                      if (textContent.includes('Clanes Exclusivos') || 
                          // textContent.includes('Otros Clanes') ||
                          el.classList.contains('clan-section-title') || 
                          el.classList.contains('clan-category') || 
                          el.tagName === 'H3' || 
                          el.tagName === 'H4' ||
                          (el.tagName === 'DIV' && !el.classList.contains('selected-item') && (el.textContent.includes('Clanes Exclusivos') 
																							   // || el.textContent.includes('Otros Clanes')
																							  ))) {
                        el.style.display = 'block';
                      } else if (el.tagName === 'LABEL') {
                        el.style.display = '';
                      } else if (el.tagName !== 'LABEL' && !el.classList.contains('selected-item')) {
                        // Mostrar otros elementos que no sean labels
                        el.style.display = '';
                      }
                    }
                  });
                }
              }
            }
          });

          // Usar delegación de eventos para inputs que se agreguen dinámicamente
          fieldset.addEventListener('change', function(e) {
            if (e.target.matches('input[type="radio"], input[type="checkbox"], select')) {
              // Cuando se selecciona un nuevo item, forzar colapso
              setTimeout(() => updateDisplay(true), 50);
            }
          });

          // Observer para detectar cuando se agregan elementos dinámicamente
          const observer = new MutationObserver(function(mutations) {
            let shouldUpdate = false;
            mutations.forEach(function(mutation) {
              if (mutation.addedNodes.length > 0) {
                shouldUpdate = true;
              }
            });
            if (shouldUpdate) {
              setTimeout(updateDisplay, 100);
            }
          });

          observer.observe(fieldset, {
            childList: true,
            subtree: true
          });

          // Inicializar estado
          setTimeout(updateDisplay, 500);
          setTimeout(updateDisplay, 1500);
        }

        // Inicializar cada fieldset
        fieldsets.forEach(fieldset => {
          initFieldsetCollapse(fieldset);
        });
      }

      // Intentar inicializar múltiples veces para asegurar que funcione
      function tryInitSelectorCollapse() {
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initSelectorCollapse, 300);
            setTimeout(initSelectorCollapse, 1000);
            setTimeout(initSelectorCollapse, 2000);
          });
        } else {
          setTimeout(initSelectorCollapse, 300);
          setTimeout(initSelectorCollapse, 1000);
          setTimeout(initSelectorCollapse, 2000);
          setTimeout(initSelectorCollapse, 3000);
        }
      }

      tryInitSelectorCollapse();

      // También escuchar eventos personalizados si se usan para cargar selectores
      document.addEventListener('selectorsLoaded', function() {
        setTimeout(initSelectorCollapse, 100);
      });

      // Observer global para detectar cuando se agregan fieldsets
      const globalObserver = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          mutation.addedNodes.forEach(function(node) {
            if (node.nodeType === 1) {
              if (node.matches && (node.matches('fieldset.listaSeason') || 
                                   node.matches('fieldset.listaAldeas') || 
                                   node.matches('fieldset.listaClanes') || 
                                   node.matches('fieldset.listaElementos'))) {
                setTimeout(initSelectorCollapse, 200);
              }
              if (node.querySelector && node.querySelector('fieldset.listaSeason, fieldset.listaAldeas, fieldset.listaClanes, fieldset.listaElementos')) {
                setTimeout(initSelectorCollapse, 200);
              }
            }
          });
        });
      });

      globalObserver.observe(document.body, {
        childList: true,
        subtree: true
      });
    })();
  </script>
