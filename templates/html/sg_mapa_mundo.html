		function zoomout() {

			var back = document.getElementById("world");
			back.style.display = "none";
			var buttons = document.getElementById("buttonParent");
			var subs = buttons.getElementsByClassName('worldBut');
			for(var i = 0; i < subs.length; i++){
				var a = subs[i];
				a.style.display = 'block';
			}
			deleteButtons();
